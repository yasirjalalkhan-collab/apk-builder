name: Build Python EXE

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'EXE Name'
        required: true
        default: 'MyApp'
      entry_file:
        description: 'Entry Python File'
        required: true
        default: 'main.py'
      icon_file:
        description: 'Icon File (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: pwsh
        run: |
          pip install pyinstaller
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
      - name: Build EXE
        shell: pwsh
        run: |
          $a = @("--name", "${{ inputs.app_name }}", "--onefile", "--clean", "--noconfirm")
          if ("${{ inputs.icon_file }}" -ne "") {
            $a += "--icon=${{ inputs.icon_file }}"
          }
          $a += "${{ inputs.entry_file }}"
          pyinstaller $a
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-EXE
          path: dist/${{ inputs.app_name }}.exe
          retention-days: 30
