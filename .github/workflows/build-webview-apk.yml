name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'WebApp'
      pkg_name:
        description: 'Package Name'
        required: true
        default: 'com.example.webapp'
      version:
        description: 'Version'
        required: false
        default: '1.0.0'
      html_file:
        description: 'Entry HTML File'
        required: false
        default: 'index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Init Capacitor
        run: |
          npx cap init "${{ inputs.app_name }}" "${{ inputs.pkg_name }}" --web-dir www

      - name: Add Android
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Fix Gradle cache issue
        run: |
          rm -rf ~/.gradle/caches/
          cd android
          sed -i 's/classpath("com.android.tools.build:gradle:[^"]*")/classpath("com.android.tools.build:gradle:8.1.4")/' build.gradle.kts 2>/dev/null || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-build-cache

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-WebView-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
