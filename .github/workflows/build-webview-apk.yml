name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'WebApp'
      pkg_name:
        description: 'Package Name'
        required: true
        default: 'com.example.webapp'
      version:
        description: 'Version'
        required: false
        default: '1.0.0'
      html_file:
        description: 'Entry HTML File'
        required: false
        default: 'index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Build project structure
        run: |
          mkdir -p myapp/app/src/main/java/com/example/webapp
          mkdir -p myapp/app/src/main/assets/www
          mkdir -p myapp/app/src/main/res/values
          mkdir -p myapp/gradle/wrapper

      - name: Copy HTML
        run: cp -r www/. myapp/app/src/main/assets/www/

      - name: Create MainActivity.java
        run: |
          cat > myapp/app/src/main/java/com/example/webapp/MainActivity.java << 'JAVAEOF'
          package com.example.webapp;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView w = new WebView(this);
              setContentView(w);
              WebSettings s = w.getSettings();
              s.setJavaScriptEnabled(true);
              s.setDomStorageEnabled(true);
              w.setWebViewClient(new WebViewClient());
              w.loadUrl("file:///android_asset/www/index.html");
            }
          }
          JAVAEOF

      - name: Create AndroidManifest.xml
        run: |
          cat > myapp/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.webapp">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="WebApp"
              android:allowBackup="true"
              android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          XMLEOF

      - name: Create strings.xml
        run: |
          cat > myapp/app/src/main/res/values/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">WebApp</string>
          </resources>
          STREOF

      - name: Create app/build.gradle
        run: |
          cat > myapp/app/build.gradle << 'GRADEOF'
          plugins {
            id 'com.android.application'
          }
          android {
            compileSdk 33
            defaultConfig {
              applicationId "com.example.webapp"
              minSdk 21
              targetSdk 33
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              debug {}
            }
          }
          dependencies {}
          GRADEOF

      - name: Create root build.gradle
        run: |
          cat > myapp/build.gradle << 'ROOTEOF'
          plugins {
            id 'com.android.application' version '8.1.0' apply false
          }
          ROOTEOF

      - name: Create settings.gradle
        run: |
          cat > myapp/settings.gradle << 'SETEOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "myapp"
          include ':app'
          SETEOF

      - name: Create gradle wrapper
        run: |
          cat > myapp/gradle/wrapper/gradle-wrapper.properties << 'WRAPEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPEOF
          cd myapp
          gradle wrapper --gradle-version 8.1

      - name: Build APK
        run: |
          cd myapp
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-APK
          path: myapp/app/build/outputs/apk/debug/*.apk
          retention-days: 30
