name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'WebApp'
      pkg_name:
        description: 'Package Name'
        required: true
        default: 'com.example.webapp'
      version:
        description: 'Version'
        required: false
        default: '1.0.0'
      html_file:
        description: 'Entry HTML File'
        required: false
        default: 'index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/webapp
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Copy HTML files
        run: cp -r www/. app/src/main/assets/www/

      - name: Download Gradle wrapper
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.1.0/gradle/wrapper/gradle-wrapper.jar

          curl -L -o gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v8.1.0/gradlew

          chmod +x gradlew

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/example/webapp/MainActivity.java << 'EOF'
          package com.example.webapp;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView w = new WebView(this);
              setContentView(w);
              WebSettings s = w.getSettings();
              s.setJavaScriptEnabled(true);
              s.setDomStorageEnabled(true);
              w.setWebViewClient(new WebViewClient());
              w.loadUrl("file:///android_asset/www/index.html");
            }
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.webapp">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="WebApp"
              android:allowBackup="true"
              android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">WebApp</string>
          </resources>
          EOF

      - name: Create app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
            id 'com.android.application'
          }
          android {
            compileSdk 33
            defaultConfig {
              applicationId "com.example.webapp"
              minSdk 21
              targetSdk 33
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              debug {}
            }
          }
          dependencies {}
          EOF

      - name: Create root build.gradle
        run: |
          cat > build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.1.0' apply false
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "myapp"
          include ':app'
          EOF

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
