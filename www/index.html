    <script type="text/babel">
        // --- Firebase Configuration ---
        const firebaseConfig = {
          apiKey: "AIzaSyCGpLxD7RUOOtkW_aB9NniIZQAsOFIJAxk",
          authDomain: "timber-360.firebaseapp.com",
          projectId: "timber-360",
          storageBucket: "timber-360.firebasestorage.app",
          messagingSenderId: "264126565972",
          appId: "1:264126565972:web:d974b78ed8a5f2114427c1"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        db.enablePersistence({ synchronizeTabs: true }).catch(err => console.log(err));

        const { useState, useEffect, useMemo, useRef, Component } = React;

            /* ================= CONSTANTS & UTILS ================= */
        const STD_WIDTHS = [27, 30, 33, 36, 39, 42, 45, 48];
        const TYPE_DOOR = 'door'; const TYPE_SKIN = 'skin'; const TYPE_PLYWOOD = 'plywood'; const TYPE_WOOD = 'wood';
        const ITEM_TYPES = [{ id: TYPE_DOOR, label: 'Door' }, { id: TYPE_SKIN, label: 'Skins' }, { id: TYPE_PLYWOOD, label: 'Ply' }, { id: TYPE_WOOD, label: 'Wood' }];

        // Generate ID
        const generateId = (prefix = '') => `${prefix}${Math.random().toString(36).substr(2, 9)}`;
        // --- 1. فون نمبر میچ کرنے کے لیے (صفائی والا فنکشن) ---
        const normalizePhone = (phone) => {
            if (!phone) return "";
            let p = phone.toString().replace(/\D/g, ''); // صرف نمبر رکھیں
            if (p.startsWith('92')) p = p.substring(2); // اگر 92 ہے تو ہٹا دیں
            if (p.startsWith('0')) p = p.substring(1);  // اگر 0 ہے تو ہٹا دیں
            return p; // نتیجہ: "3211234567"
        };

        // --- 2. واٹس ایپ لنک بنانے والا (اسمارٹ فنکشن) ---
        const getWaLink = (mobile, customerName = '', balance = 0, currency = 'PKR') => {
            if (!mobile) return '';
            let m = mobile.toString().replace(/[^0-9+]/g, '');
            if (m.startsWith('0')) m = '92' + m.substring(1);
            
            // Professional reminder message in English
            let message = '';
            if (customerName && balance > 0) {
                message = `?text=Dear ${customerName},%0A%0A`;
                message += `Hope you are doing well.%0A%0A`;
                message += `This is a gentle reminder regarding your account balance:%0A`;
                message += `Outstanding Amount: ${formatMoney(balance, currency)}%0A%0A`;
                message += `We would appreciate if you could arrange the payment at your earliest convenience.%0A%0A`;
                message += `Thank you for your business!`;
            }
            
            return `https://wa.me/${m.replace('+', '')}${message}`;
        };

            // --- یہ نیا کوڈ پیسٹ کریں ---
        const getNextInvoiceId = (invoices) => {
            if (!invoices || invoices.length === 0) return "1000";
            const maxId = invoices.reduce((max, inv) => {
                const num = parseInt(String(inv.id).replace(/\D/g, ''));
                return !isNaN(num) && num > max ? num : max;
            }, 0);
            return maxId > 0 ? String(maxId + 1) : "1000";
        };
        // ---------------------------

        // Date Formatter
        const formatDate = (dateString) => {
            if (!dateString) return '-';
            const d = new Date(dateString);
            return isNaN(d.getTime()) ? '-' : d.toLocaleDateString('en-PK', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        // Inches to Feet Formatter
        const formatInchesToFt = (inches) => {
            const val = parseFloat(inches) || 0;
            const ft = Math.floor(val / 12);
            const remIn = val % 12;
            return ft > 0 ? `${ft}' ${remIn > 0 ? remIn + '"' : ''}` : `${val}"`;
        };

        // Money Formatter
        const formatMoney = (amount, currencyCode = 'PKR') => {
            const val = parseFloat(amount) || 0;
            const sym = currencyCode === 'USD' ? '$' : currencyCode === 'EUR' ? '€' : 'Rs.';
            return `${sym} ${val.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
        };

        // 📄 Professional Invoice PDF matching InvoicePrinter design
        const generateInvoicePDF = (invoice, profile, settings, customers) => {
            if (!invoice || !profile) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            const items = invoice.items || [];
            const customer = invoice.customer || {};
            const groups = {
                WOOD: items.filter(i => i.unit === 'Cu.Ft'),
                DOOR: items.filter(i => i.unit === 'Sq.Ft'),
                PLY: items.filter(i => i.unit !== 'Cu.Ft' && i.unit !== 'Sq.Ft')
            };
            
            // ✅ REAL-TIME Running Balance for PDF (Professional Fix)
            const currentCustDataPDF = (customers || []).find(c => String(c.id) === String(customer.id)) || customer;
            const ledger = currentCustDataPDF.ledger || [];
            const sortedLedgerPDF = [...ledger].sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                if (dateA - dateB !== 0) return dateA - dateB;
                if (a.type === 'Debit' && b.type === 'Credit') return -1;
                if (a.type === 'Credit' && b.type === 'Debit') return 1;
                return 0;
            });
            const billEntryIdPDF = 'bill-' + invoice.id;
            const billIndexPDF = sortedLedgerPDF.findIndex(tx => String(tx.id) === billEntryIdPDF);
            let previousBalance = 0;
            const calcUpToPDF = billIndexPDF >= 0 ? billIndexPDF : sortedLedgerPDF.length;
            for (let i = 0; i < calcUpToPDF; i++) {
                const tx = sortedLedgerPDF[i];
                const amt = parseFloat(tx.amount) || 0;
                if (tx.type === 'Debit') previousBalance += amt;
                else previousBalance -= amt;
            }
            const currentBillTotal = parseFloat(invoice.total) || 0;
            const cashPaid = parseFloat(invoice.cashPaid) || 0;
            const chequeList = invoice.cheques || [];
            const totalChequeAmt = chequeList.filter(c => c.status !== "returned").reduce((a, c) => a + (parseFloat(c.amount) || 0), 0);
            const totalPaidToday = cashPaid + totalChequeAmt;
            const netPayableNow = previousBalance + currentBillTotal - totalPaidToday;
            
            let y = 20;
            
            // Header with logo
            if (profile.logo) {
                try {
                    doc.addImage(profile.logo, 'PNG', 20, 15, 30, 30);
                } catch (e) {}
            }
            
            doc.setFontSize(24);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(30, 41, 59);
            doc.text(profile.name || 'Invoice', profile.logo ? 55 : 20, 25);
            
            doc.setFontSize(9);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(71, 85, 105);
            doc.text(profile.ownerName || '', profile.logo ? 55 : 20, 32);
            
            doc.setFont(undefined, 'normal');
            doc.setTextColor(107, 114, 128);
            doc.text(profile.address || '', profile.logo ? 55 : 20, 37);
            doc.setTextColor(249, 115, 22);
            doc.setFont(undefined, 'bold');
            doc.text(profile.phone || '', profile.logo ? 55 : 20, 42);
            
            // Invoice title (right side)
            doc.setFontSize(20);
            doc.setTextColor(226, 232, 240);
            doc.setFont(undefined, 'bold');
            doc.text('INVOICE', 190, 25, { align: 'right' });
            
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            const invoiceNum = profile.invoicePrefix ? `${profile.invoicePrefix}-${invoice.id}` : invoice.id;
            doc.text(`#${invoiceNum}`, 190, 32, { align: 'right' });
            
            doc.setFontSize(9);
            doc.setTextColor(107, 114, 128);
            doc.text(formatDate(invoice.date), 190, 37, { align: 'right' });
            
            y = 50;
            doc.setLineWidth(0.5);
            doc.setDrawColor(226, 232, 240);
            doc.line(20, y, 190, y);
            
            y = 58;
            
            // Customer box
            doc.setFillColor(248, 250, 252);
            doc.rect(20, y, 170, 18, 'F');
            doc.setFontSize(7);
            doc.setTextColor(148, 163, 184);
            doc.setFont(undefined, 'bold');
            doc.text('BILL TO:', 24, y + 5);
            
            doc.setFontSize(12);
            doc.setTextColor(30, 41, 59);
            doc.setFont(undefined, 'bold');
            doc.text(customer.name || '', 24, y + 11);
            
            doc.setFontSize(9);
            doc.setTextColor(71, 85, 105);
            doc.setFont(undefined, 'normal');
            doc.text(customer.mobile || '', 24, y + 15);
            
            y = 80;
            
            // Table header
            doc.setFillColor(30, 41, 59);
            doc.rect(20, y, 170, 8, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(8);
            doc.setFont(undefined, 'bold');
            doc.text('Item', 22, y + 5);
            doc.text('Size', 85, y + 5, { align: 'center' });
            doc.text('Qty', 105, y + 5, { align: 'center' });
            doc.text('Measurement', 125, y + 5, { align: 'center' });
            doc.text('Rate', 155, y + 5, { align: 'center' });
            doc.text('Amount', 188, y + 5, { align: 'right' });
            
            y += 8;
            
            // Render groups
            const renderGroup = (title, unit, groupItems) => {
                if (!groupItems.length) return;
                
                // Check if group title fits, otherwise new page
                if (y > 240) { 
                    doc.addPage(); 
                    y = 20;
                    // Re-draw table header on new page
                    doc.setFillColor(30, 41, 59);
                    doc.rect(20, y, 170, 8, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(8);
                    doc.setFont(undefined, 'bold');
                    doc.text('Item', 22, y + 5);
                    doc.text('Size', 85, y + 5, { align: 'center' });
                    doc.text('Qty', 105, y + 5, { align: 'center' });
                    doc.text('Measurement', 125, y + 5, { align: 'center' });
                    doc.text('Rate', 155, y + 5, { align: 'center' });
                    doc.text('Amount', 188, y + 5, { align: 'right' });
                    y += 10;
                }
                
                // Group title
                doc.setFontSize(10);
                doc.setTextColor(30, 41, 59);
                doc.setFont(undefined, 'bold');
                doc.text(title, 22, y + 5);
                y += 8;
                
                let groupQty = 0, groupMeas = 0, groupAmt = 0;
                
                doc.setFontSize(8);
                doc.setTextColor(0, 0, 0);
                doc.setFont(undefined, 'normal');
                
                groupItems.forEach(item => {
                    // Check if item fits, otherwise new page
                    if (y > 265) { 
                        doc.addPage(); 
                        y = 20;
                        // Re-draw table header
                        doc.setFillColor(30, 41, 59);
                        doc.rect(20, y, 170, 8, 'F');
                        doc.setTextColor(255, 255, 255);
                        doc.setFontSize(8);
                        doc.setFont(undefined, 'bold');
                        doc.text('Item', 22, y + 5);
                        doc.text('Size', 85, y + 5, { align: 'center' });
                        doc.text('Qty', 105, y + 5, { align: 'center' });
                        doc.text('Measurement', 125, y + 5, { align: 'center' });
                        doc.text('Rate', 155, y + 5, { align: 'center' });
                        doc.text('Amount', 188, y + 5, { align: 'right' });
                        y += 10;
                        doc.setTextColor(0, 0, 0);
                        doc.setFontSize(8);
                        doc.setFont(undefined, 'normal');
                    }
                    
                    const qty = item.qty || 0;
                    const meas = (item.qtyUnit || 0) * qty;
                    const amt = (item.amount || 0) * qty;
                    
                    groupQty += qty;
                    groupMeas += meas;
                    groupAmt += amt;
                    
                    doc.setFont(undefined, 'bold');
                    doc.text(item.name, 22, y + 3);
                    if (item.stockNote) {
                        doc.setFontSize(6);
                        doc.setTextColor(107, 114, 128);
                        doc.setFont(undefined, 'normal');
                        doc.text(item.stockNote, 22, y + 6);
                        doc.setFontSize(8);
                        doc.setTextColor(0, 0, 0);
                    }
                    
                    doc.setFont(undefined, 'normal');
                    doc.text(item.displaySize || '', 85, y + 3, { align: 'center' });
                    doc.setFont(undefined, 'bold');
                    doc.text(String(qty), 105, y + 3, { align: 'center' });
                    doc.setFont(undefined, 'normal');
                    doc.text(`${meas.toFixed(2)} ${item.unit}`, 125, y + 3, { align: 'center' });
                    doc.text(String(item.rate || 0), 155, y + 3, { align: 'center' });
                    doc.setFont(undefined, 'bold');
                    doc.text(formatMoney(amt, settings.currency), 188, y + 3, { align: 'right' });
                    
                    y += 6;
                    doc.setDrawColor(226, 232, 240);
                    doc.setLineWidth(0.1);
                    doc.line(20, y, 190, y);
                });
                
                // Group total
                doc.setFillColor(241, 245, 249);
                doc.rect(20, y, 170, 6, 'F');
                doc.setFont(undefined, 'bold');
                doc.setFontSize(8);
                doc.text(`Total ${title}`, 22, y + 4);
                doc.text(String(groupQty), 105, y + 4, { align: 'center' });
                doc.text(`${groupMeas.toFixed(2)} ${unit}`, 125, y + 4, { align: 'center' });
                doc.text(formatMoney(groupAmt, settings.currency), 188, y + 4, { align: 'right' });
                y += 8;
            };
            
            renderGroup('Wood / Timber', 'Cu.Ft', groups.WOOD);
            renderGroup('Door & Skin', 'Sq.Ft', groups.DOOR);
            renderGroup('Plywood', 'Unit', groups.PLY);
            
            y += 5;
            
            // Balance box
            const boxX = 130;
            const boxW = 60;
            
            doc.setFillColor(248, 250, 252);
            doc.rect(boxX, y - 3, boxW, 40, 'F');
            doc.setDrawColor(226, 232, 240);
            doc.rect(boxX, y - 3, boxW, 40, 'S');
            
            doc.setFontSize(8);
            doc.setTextColor(107, 114, 128);
            doc.setFont(undefined, 'normal');
            
            doc.text('Previous Balance', boxX + 2, y + 2);
            doc.text(formatMoney(previousBalance, settings.currency), boxX + boxW - 2, y + 2, { align: 'right' });
            y += 5;
            
            doc.setFont(undefined, 'bold');
            doc.setTextColor(30, 41, 59);
            doc.text('Current Bill Total', boxX + 2, y + 2);
            doc.text(formatMoney(currentBillTotal, settings.currency), boxX + boxW - 2, y + 2, { align: 'right' });
            y += 5;
            
            if (cashPaid > 0) {
                doc.setTextColor(21, 128, 61);
                doc.text('Cash Received', boxX + 2, y + 2);
                doc.text(`-${formatMoney(cashPaid, settings.currency)}`, boxX + boxW - 2, y + 2, { align: 'right' });
                y += 5;
            }
            
            if (chequeList.length > 0) {
                doc.setFontSize(7);
                doc.setTextColor(29, 78, 216);
                chequeList.forEach(c => {
                    doc.text(`Cheque: ${c.bank} #${c.number}`, boxX + 2, y + 2);
                    doc.text(`-${formatMoney(c.amount, settings.currency)}`, boxX + boxW - 2, y + 2, { align: 'right' });
                    y += 4;
                });
                doc.setFontSize(8);
            }
            
            y += 2;
            doc.setLineWidth(0.3);
            doc.setDrawColor(30, 41, 59);
            doc.line(boxX + 2, y, boxX + boxW - 2, y);
            y += 5;
            
            doc.setFontSize(10);
            doc.setTextColor(30, 41, 59);
            doc.setFont(undefined, 'bold');
            doc.text('BALANCE DUE', boxX + 2, y + 2);
            doc.text(formatMoney(netPayableNow, settings.currency), boxX + boxW - 2, y + 2, { align: 'right' });
            
            // Signature Section (below balance)
            y += 15;
            doc.setFontSize(9);
            doc.setTextColor(71, 85, 105);
            doc.setFont(undefined, 'bold');
            doc.text('Authorized Signature:', 20, y);
            
            y += 5;
            doc.setFont(undefined, 'normal');
            doc.setFontSize(10);
            doc.text(profile.ownerName || '', 20, y);
            
            y += 12;
            doc.setLineWidth(0.3);
            doc.setDrawColor(107, 114, 128);
            doc.line(20, y, 80, y);
            doc.setFontSize(7);
            doc.setTextColor(107, 114, 128);
            doc.text('Signature', 20, y + 3);
            
            // Footer (below signature - dynamic position)
            y += 10;
            doc.setFontSize(8);
            doc.setTextColor(71, 85, 105);
            doc.setFont(undefined, 'normal');
            const footerText = profile.footer || 'Thank you for your business!';
            doc.text(footerText, 105, y, { align: 'center', maxWidth: 170 });
            
            doc.save(`Invoice-${invoice.id}.pdf`);
        };

        const generateLedgerPDF = (customer, filteredLedger, allLedger, startDate, endDate, settings, profile) => {
            if (!customer || !allLedger) return;

            doc.rect(20, y, 170, 18, 'S');
            
            doc.setFontSize(12);
            doc.setTextColor(30, 41, 59);
            doc.setFont(undefined, 'bold');
            doc.text(customer.name || '', 24, y + 6);
            
            doc.setFontSize(8);
            doc.setTextColor(71, 85, 105);
            doc.setFont(undefined, 'normal');
            if (customer.mobile) doc.text(`Mobile: ${customer.mobile}`, 24, y + 11);
            if (customer.address) doc.text(`Address: ${customer.address}`, 24, y + 15);
            
            y += 22;
            
            // Date range (if filtered)
            if (startDate && endDate) {
                doc.setFontSize(8);
                doc.setTextColor(107, 114, 128);
                doc.text(`Period: ${formatDate(startDate)} to ${formatDate(endDate)}`, 105, y, { align: 'center' });
                y += 6;
            }
            
            // Calculate balances
            const totalDebits = allLedger.reduce((a, t) => a + (t.type === 'Debit' ? parseFloat(t.amount) : 0), 0);
            const totalCredits = allLedger.reduce((a, t) => a + (t.type === 'Credit' ? parseFloat(t.amount) : 0), 0);
            const closingBalance = totalDebits - totalCredits;
            
            // Opening balance (before filtered period)
            let openingBalance = 0;
            if (startDate && filteredLedger.length > 0) {
                const firstFilteredIndex = allLedger.findIndex(t => t.id === filteredLedger[0].id);
                if (firstFilteredIndex > 0) {
                    openingBalance = allLedger[firstFilteredIndex - 1].currentBal || 0;
                }
            }
            
            // Opening balance box
            doc.setFillColor(220, 252, 231);
            doc.rect(20, y, 85, 10, 'F');
            doc.setDrawColor(34, 197, 94);
            doc.rect(20, y, 85, 10, 'S');
            doc.setFontSize(9);
            doc.setTextColor(22, 101, 52);
            doc.setFont(undefined, 'bold');
            doc.text('Opening Balance:', 24, y + 6);
            doc.text(formatMoney(openingBalance, settings.currency), 103, y + 6, { align: 'right' });
            
            // Closing balance box
            const balanceColor = closingBalance > 0 ? [254, 226, 226] : [220, 252, 231];
            const borderColor = closingBalance > 0 ? [220, 38, 38] : [34, 197, 94];
            const textColor = closingBalance > 0 ? [153, 27, 27] : [22, 101, 52];
            
            doc.setFillColor(...balanceColor);
            doc.rect(105, y, 85, 10, 'F');
            doc.setDrawColor(...borderColor);
            doc.rect(105, y, 85, 10, 'S');
            doc.setTextColor(...textColor);
            doc.text('Closing Balance:', 109, y + 6);
            doc.text(formatMoney(closingBalance, settings.currency), 188, y + 6, { align: 'right' });
            
            y += 15;

            doc.setFillColor(30, 41, 59);

            doc.setFont(undefined, 'bold');

            doc.text('Description', 50, y + 5);
            doc.text('Debit', 115, y + 5, { align: 'center' });
            doc.text('Credit', 140, y + 5, { align: 'center' });
            doc.text('Balance', 188, y + 5, { align: 'right' });
            
            y += 8;
            
            // Transactions
            const ledgerToShow = filteredLedger.length > 0 ? filteredLedger : allLedger;
            
            doc.setFontSize(7);
            doc.setTextColor(0, 0, 0);
            doc.setFont(undefined, 'normal');
            
            ledgerToShow.forEach((tx, idx) => {
                if (y > 270) {
                    doc.addPage();
                    y = 20;
                    // Redraw header
                    doc.setFillColor(30, 41, 59);
                    doc.rect(20, y, 170, 8, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(8);
                    doc.setFont(undefined, 'bold');
                    doc.text('Date', 22, y + 5);
                    doc.text('Description', 50, y + 5);
                    doc.text('Debit', 115, y + 5, { align: 'center' });
                    doc.text('Credit', 140, y + 5, { align: 'center' });
                    doc.text('Balance', 188, y + 5, { align: 'right' });
                    y += 8;
                    doc.setFontSize(7);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont(undefined, 'normal');
                }
                
                // Alternate row color
                if (idx % 2 === 0) {
                    doc.setFillColor(249, 250, 251);
                    doc.rect(20, y, 170, 5, 'F');
                }
                
                doc.text(formatDate(tx.date), 22, y + 3.5);
                const desc = (tx.desc || '').substring(0, 30);
                doc.text(desc, 50, y + 3.5);
                
                if (tx.type === 'Debit') {
                    doc.setTextColor(220, 38, 38);
                    doc.text(formatMoney(tx.amount, ''), 115, y + 3.5, { align: 'center' });

                    doc.text(formatMoney(tx.amount, ''), 140, y + 3.5, { align: 'center' });
                    doc.setTextColor(0, 0, 0);
                }

                doc.text(formatMoney(tx.currentBal || 0, settings.currency), 188, y + 3.5, { align: 'right' });
                doc.setFont(undefined, 'normal');
                
                y += 5;

        /* --- CALCULATION LOGIC --- */
        const calculateDoor = (wIn, hTotalIn, rate, calcMode = 'standard') => {
            const w = parseFloat(wIn) || 0; const hIn = parseFloat(hTotalIn) || 0;
            let billW = w;
            let billH_Ft = hIn / 12;
            
            if (calcMode === 'standard') {
                billW = STD_WIDTHS.find(std => std >= w) || (w > 48 ? w : 48);
                billH_Ft = (hIn <= 84 && hIn > 0) ? 7 : (hIn > 84 && hIn <= 96) ? 8 : (hIn > 96) ? 9 : Math.ceil(hIn / 12);
            }
            
            let finalW = calcMode === 'standard' ? billW : w;
            let finalH_In = calcMode === 'standard' ? (billH_Ft * 12) : hIn;
            
            const sqFt = (finalW * finalH_In) / 144;
            return { 
                displaySize: `${w}" x ${formatInchesToFt(hIn)}`, 
                billingSize: calcMode === 'standard' ? `${billW}" x ${billH_Ft}'` : `${w}" x ${formatInchesToFt(hIn)} (Act)`, 
                unit: 'Sq.Ft', 
                qtyUnit: sqFt, 
                amount: sqFt * rate 
            };
        };

        const calculateWood = (l, w, t, unitWT, unitL, rate) => {
            const val = parseFloat(l) || 0;
            let l_in = 0; 
            if (unitL === 'ft') l_in = val * 12; 
            else if (unitL === 'm') l_in = val * 39.3701; 
            else l_in = val; 
            
            const toInchWT = (v) => unitWT === 'mm' ? (parseFloat(v) || 0) / 25.4 : (parseFloat(v) || 0);
            const w_in = toInchWT(w); const t_in = toInchWT(t);
            
            const vol = (l_in * w_in * t_in) / 1728;
            return { 
                displaySize: `${l}${unitL} x ${w}${unitWT} x ${t}${unitWT}`, 
                billingSize: `${l_in.toFixed(1)}" x ${w_in.toFixed(1)}" x ${t_in.toFixed(1)}"`, 
                unit: 'Cu.Ft', 
                qtyUnit: vol, 
                amount: vol * rate 
            };
        };

        const calculatePlywood = (rate) => ({ displaySize: 'Standard Sheet', billingSize: 'Sheet', unit: 'Sheet', qtyUnit: 1, amount: rate });

            /* ================= SCREENS: PROFILE, SETTINGS, CALCULATOR ================= */

                    setIsDark(false); 
                    setSettings({...settings, mode: 'light'});
                }

                                <Icon name="X" size={18}/>

                                    className={`flex items-center gap-3 p-4 rounded-xl border transition-all ${isGuest ? 'bg-slate-50 dark:bg-slate-700/30 border-slate-100 dark:border-slate-700 opacity-50' : 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 hover:bg-green-100'}`}>
                                    <div className="w-9 h-9 rounded-xl bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 flex items-center justify-center shrink-0">

            const safeCalculate = (expression) => {
                try {
                    // 1. صرف نمبرز اور نشانات کی اجازت (سیکیورٹی)
                    if (/[^0-9+\-*/().% ]/.test(expression)) return ""; 
                    
                    // 2. نشانات کو درست کرنا (× کو * اور ÷ کو / بنانا)
                    let safeExp = expression.replace(/×/g, '*').replace(/÷/g, '/');
                    
                    // 3. فیصد (%) کا علاج: نمبر کے بعد /100 لگا دو
                    // مثال: 50% بن جائے گا 50/100
                    safeExp = safeExp.replace(/(\d+(\.\d+)?)%/g, '($1/100)');

                    // 4. آخری نشان اگر ادھورا ہو تو اسے نظر انداز کریں
                    if (['+','-','*','/'].includes(safeExp.slice(-1))) return "";

                    // 5. حساب کریں (New Function is safe here because of Regex check above)
                    const res = new Function('return ' + safeExp)();
                    return String(res); // اگر جواب ٹھیک ہے تو واپس بھیجیں
                } catch (e) {
                    return ""; // اگر کوئی ایرر ہو تو خالی بھیجیں
                }
            };

            useEffect(() => {

                const res = safeCalculate(input);
                // اگر جواب ان پٹ جیسا ہی ہے تو لائیو دکھانے کی ضرورت نہیں
                if (res && res !== input) setLiveResult(res);
                else setLiveResult('');
            }, [input]);

                if (val === 'C') { setInput(''); setLiveResult(''); return; }

                    }

// ✅ FINAL CORRECT CHEQUE MANAGER

// ========================================

const ChequeManager = ({ cheques, invoices, setCheques, setInvoices, onClose, customer, settings, onDeleteCheque, setCustomers, showAlert, showConfirm, showPrompt, formatMoney, formatDate }) => {

    const isDark = settings?.mode === 'dark';
    const isDashboard = String(customer.id) === 'all';
    const safeCheques = Array.isArray(cheques) ? cheques : [];
    const safeInvoices = Array.isArray(invoices) ? invoices : [];
    
    const custCheques = safeCheques.filter(c => isDashboard ? true : String(c.customerId) === String(customer.id));
    const clearedCount = custCheques.filter(c => c.status === 'cleared').length;

    // ✅ اسٹیٹس اپ ڈیٹ (CORRECT - آپ کے Business Logic کے مطابق)
    const updateStatus = (chequeId, newStatus) => { 
        const targetCheque = safeCheques.find(c => String(c.id) === String(chequeId));
        if (!targetCheque) return;
        
        const oldStatus = targetCheque.status; // پرانی status

        // ========== INVOICE UPDATE ==========
        if (targetCheque.invoiceId && setInvoices) {
            const inv = safeInvoices.find(i => String(i.id) === String(targetCheque.invoiceId));
            
            if (inv) {
                const updatedInvCheques = (inv.cheques || []).map(c => 
                    String(c.id) === String(chequeId) ? { ...c, status: newStatus } : c
                );

                // Returned چیکوں کو نہیں گنیں گے
                const newChequeTotal = updatedInvCheques.reduce((sum, c) => {
                    if (c.status === 'returned') return sum + 0;
                    return sum + (parseFloat(c.amount) || 0);
                }, 0);

                const freshPaidTotal = (parseFloat(inv.cashPaid) || 0) + newChequeTotal;
                const newBalance = (parseFloat(inv.total) || 0) - freshPaidTotal;

                setInvoices({ ...inv, cheques: updatedInvCheques, paid: freshPaidTotal, balance: newBalance });
            }
        }

        // ========== DIRECT CHEQUE - LEDGER UPDATE (CORRECT LOGIC) ==========
        if (!targetCheque.invoiceId && !isDashboard && setCustomers) {
            let newLedger = [...(customer.ledger || [])];
            
            // 🎯 کلیدی اصول: پرانی entries کو مت ہٹاؤ، صرف نئی شامل کرو
            
            if (oldStatus === 'pending' && newStatus === 'cleared') {
                // ✅ Case 1: Pending → Clear
                // کچھ نہیں کرنا! چیک پہلے ہی Credit میں ہے
                // (صرف status بدلے گی cheques collection میں)
            }
            else if (oldStatus === 'pending' && newStatus === 'returned') {
                // ❌ Case 2: Pending → Return
                // چیک واپس آیا، Debit کریں
                newLedger.unshift({
                    id: 'chq-return-' + chequeId + '-' + Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    desc: `⚠️ Cheque Returned: ${targetCheque.bank} #${targetCheque.number}`,
                    amount: parseFloat(targetCheque.amount),
                    type: 'Debit',
                    method: 'Cheque',
                    chequeId: chequeId
                });
                
                // کسٹمر update
                setCustomers({ ...customer, ledger: newLedger });
            }
            else if (oldStatus === 'returned' && newStatus === 'cleared') {
                // ✅ Case 3: Return → Clear
                // دوبارہ چیک پاس ہوا، Credit کریں
                newLedger.unshift({
                    id: 'chq-clear-' + chequeId + '-' + Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    desc: `✅ Cheque Re-Cleared: ${targetCheque.bank} #${targetCheque.number}`,
                    amount: parseFloat(targetCheque.amount),
                    type: 'Credit',
                    method: 'Cheque',
                    chequeId: chequeId
                });
                
                // کسٹمر update
                setCustomers({ ...customer, ledger: newLedger });
            }
            else if (oldStatus === 'cleared' && newStatus === 'returned') {
                // ⚠️ Case 4: Clear → Return (rare, but possible)
                newLedger.unshift({
                    id: 'chq-reverse-' + chequeId + '-' + Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    desc: `⚠️ Cheque Reversed: ${targetCheque.bank} #${targetCheque.number}`,
                    amount: parseFloat(targetCheque.amount),
                    type: 'Debit',
                    method: 'Cheque',
                    chequeId: chequeId
                });
                
                // کسٹمر update
                setCustomers({ ...customer, ledger: newLedger });
            }
        }

        // ========== چیک Status Update ==========
        setCheques({ ...targetCheque, status: newStatus }); 
    }; 

    // ✅ ایڈٹ (کوئی تبدیلی نہیں)
    const handleEdit = async (c) => {
        const newBank = await showPrompt("Edit Bank Name:", c.bank, "Edit Bank");
        if(newBank === null) return;
        const newNum = await showPrompt("Edit Cheque Number:", c.number, "Edit Number");
        if(newNum === null) return;
        const newDate = await showPrompt("Edit Date (YYYY-MM-DD):", c.date, "Edit Date");
        if(newDate === null) return;

        setCheques({ ...c, bank: newBank, number: newNum, date: newDate });
    };

    // ✅ ڈیلیٹ (کوئی تبدیلی نہیں)
    const handleDelete = async (id) => {
        const confirmed = await showConfirm("DELETE this cheque?", "Confirm Delete");
        if(confirmed) {
            const targetCheque = safeCheques.find(c => String(c.id) === String(id));
            if (targetCheque && targetCheque.invoiceId && setInvoices) {
                 const inv = safeInvoices.find(i => String(i.id) === String(targetCheque.invoiceId));
                 if (inv) {
                     const updatedInvCheques = (inv.cheques || []).filter(c => String(c.id) !== String(id));
                     
                     const newChequeTotal = updatedInvCheques.reduce((sum, c) => {
                        if (c.status === 'returned') return sum + 0;
                        return sum + (parseFloat(c.amount) || 0);
                    }, 0);
                    
                    const freshPaidTotal = (parseFloat(inv.cashPaid) || 0) + newChequeTotal;
                    const newBalance = (parseFloat(inv.total) || 0) - freshPaidTotal;

                    setInvoices({ ...inv, cheques: updatedInvCheques, paid: freshPaidTotal, balance: newBalance });
                 }
            }
            
            if(onDeleteCheque) onDeleteCheque(id, 'reverse');
        }
    };

    // ہسٹری کلیئر
    const handleClearHistory = async () => {
        const confirmed = await showConfirm(`Remove ${clearedCount} CLEARED cheques?`, "Clear History");
        if(!confirmed) return;
        const chequesToDelete = custCheques.filter(c => c.status === 'cleared');
        chequesToDelete.forEach(c => { if(onDeleteCheque) onDeleteCheque(c.id, 'simple'); });
        await showAlert("History Cleared!", "Success");
    };

    const totalAmt = custCheques.reduce((sum, c) => sum + (parseFloat(c.amount)||0), 0);

    return (
        <div className="fixed inset-0 bg-slate-50 dark:bg-slate-900 z-50 overflow-auto flex flex-col animate-in">
            <div className="bg-slate-800 p-3 flex justify-between items-center text-white sticky top-0 z-10 shadow-md">
                <div>
                    <h2 className="font-bold text-sm flex gap-2 items-center"><Icon name="Calculator" size={16}/> {isDashboard ? 'All Cheques' : customer.name}</h2>
                    <p className="text-[10px] text-slate-300">Total Amount: {formatMoney(totalAmt, settings.currency)}</p>
                </div>
                <div className="flex gap-2">
                    {clearedCount > 0 && !isDashboard && (
                        <div className="flex flex-col items-end">
                            <button onClick={handleClearHistory} className="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded text-xs font-bold flex items-center gap-1 shadow-sm transition-all active:scale-95">
                                <Icon name="Trash2" size={12}/> Clear History ({clearedCount})
                            </button>
                            <span className="text-[9px] text-red-200 mt-1 text-right leading-tight">List only. Ledger safe.</span>
                        </div>
                    )}
                    <button onClick={onClose} className="bg-white/10 p-1.5 rounded-full hover:bg-white/20"><Icon name="X" size={16}/></button>
                </div>
            </div>
            
            <div className="p-3 space-y-3 flex-1 overflow-y-auto pb-20">
                {custCheques.length === 0 && <p className="text-center text-slate-400 mt-10 text-sm">No cheques found.</p>}
                
                {custCheques.map(c => (
                    <div key={c.id} className={`bg-white dark:bg-slate-800 p-3 rounded-lg border-l-4 shadow-sm flex flex-col gap-1 ${c.status === 'cleared' ? 'border-green-500 opacity-60' : c.status === 'returned' ? 'border-red-500' : 'border-orange-500'}`}>
                        <div className="flex justify-between items-start">
                            <div>
                                <p className="font-bold text-sm text-slate-800 dark:text-white">{c.bank}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 font-mono">#{c.number}</p>
                                <p className="text-[10px] text-slate-400 mt-0.5">{formatDate(c.date)}</p>
                                {isDashboard && <p className="text-[10px] text-blue-500 font-bold mt-1"><Icon name="Users" size={10}/> {c.customerName}</p>}
                                {c.invoiceId && <span className="text-[9px] bg-slate-100 text-slate-500 px-1 rounded ml-1">Invoice Linked</span>}
                            </div>
                            <div className="text-right">
                                <p className="font-bold text-base dark:text-white">{formatMoney(c.amount, settings.currency)}</p>
                                <span className={`text-[9px] uppercase font-bold px-2 py-0.5 rounded-full inline-block mt-1 ${c.status === 'cleared' ? 'bg-green-100 text-green-700' : c.status === 'returned' ? 'bg-red-100 text-red-700' : 'bg-orange-100 text-orange-700'}`}>{c.status}</span>
                            </div>
                        </div>
                        {!isDashboard && (
                            <div className="flex gap-2 pt-2 border-t border-slate-100 dark:border-slate-700 mt-2">
                                {c.status !== 'cleared' && (<button onClick={() => updateStatus(c.id, 'cleared')} className="flex-1 py-1.5 bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-400 text-[10px] font-bold rounded hover:bg-green-100">Mark Clear</button>)}
                                {c.status !== 'returned' && (<button onClick={() => updateStatus(c.id, 'returned')} className="flex-1 py-1.5 bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-400 text-[10px] font-bold rounded hover:bg-red-100">Mark Return</button>)}
                                <button onClick={() => handleEdit(c)} className="px-3 text-slate-500 hover:text-blue-600 bg-slate-100 dark:bg-slate-700 rounded"><Icon name="Edit2" size={14}/></button>
                                <button onClick={() => handleDelete(c.id)} className="px-3 text-red-400 hover:text-red-600 bg-red-50 dark:bg-red-900/20 rounded"><Icon name="Trash2" size={14}/></button>
                            </div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    ); 
};

            const totalFiltered = filtered.reduce((a, e) => a + (parseFloat(e.amount) || 0), 0);

            // All unique categories (including custom ones)
            const allCategories = [...new Set([...EXPENSE_CATEGORIES.filter(c => c !== 'Custom'), ...filtered.map(e => e.category)])];
            const byCategory = allCategories.map(cat => ({
                cat,
                total: filtered.filter(e => e.category === cat).reduce((a, e) => a + (parseFloat(e.amount) || 0), 0)
            })).filter(c => c.total > 0);

            return (
                <div className={`flex-1 overflow-y-auto p-4 pb-24 ${isDark ? 'bg-slate-900' : 'bg-slate-50'}`}>
                    {/* Header */}
                    <div className="flex justify-between items-center mb-4">
                        <h2 className={`font-bold text-xl ${isDark ? 'text-white' : 'text-slate-800'}`}>Expenses</h2>
                        <button onClick={() => setShowForm(!showForm)} className="bg-red-600 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow-sm">
                            <Icon name="Plus" size={16}/> Add Expense
                        </button>
                    </div>

                    {/* Add Form */}
                    {showForm && (
                        <div className={`p-4 rounded-xl border mb-4 shadow-sm ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label className={`text-xs font-bold block mb-1 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Date</label>
                                    <input type="date" className={`w-full p-2 border rounded-lg text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                </div>
                                <div>
                                    <label className={`text-xs font-bold block mb-1 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Category</label>
                                    <select className={`w-full p-2 border rounded-lg text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
                                        {EXPENSE_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                            </div>
                            {form.category === 'Custom' && (
                                <div className="mb-3">
                                    <label className={`text-xs font-bold block mb-1 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Custom Category Name</label>
                                    <input className={`w-full p-2 border rounded-lg text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} placeholder="e.g. Marketing, Insurance..." value={form.customCategory} onChange={e => setForm({...form, customCategory: e.target.value})} />
                                </div>
                            )}
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label className={`text-xs font-bold block mb-1 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Description</label>
                                    <input className={`w-full p-2 border rounded-lg text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} placeholder="e.g. Shop rent for Jan" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} />
                                </div>
                                <div>
                                    <label className={`text-xs font-bold block mb-1 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Amount</label>
                                    <input type="number" className={`w-full p-2 border rounded-lg text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} placeholder="0" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} />
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleAdd} className="flex-1 bg-red-600 text-white py-2 rounded-xl font-bold text-sm">Save Expense</button>
                                <button onClick={() => setShowForm(false)} className={`px-4 py-2 rounded-xl font-bold text-sm ${isDark ? 'bg-slate-700 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {/* Filter */}
                    <div className="flex gap-2 mb-4 items-center">
                        <input type="month" className={`p-2 border rounded-lg text-sm ${isDark ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200'}`} value={filterMonth} onChange={e => setFilterMonth(e.target.value)} placeholder="Filter by month"/>
                        {filterMonth && <button onClick={() => setFilterMonth('')} className="text-xs text-red-500 font-bold">Clear</button>}
                    </div>

                    {/* Summary Box */}
                    <div className={`p-4 rounded-xl mb-4 border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'} shadow-sm`}>
                        <div className="flex justify-between items-center mb-3">
                            <span className={`text-sm font-bold ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{filterMonth ? 'Monthly Total' : 'All Time Total'}</span>
                            <span className={`text-lg font-bold ${isDark ? 'text-red-400' : 'text-red-600'}`}>{formatMoney(totalFiltered, settings.currency)}</span>
                        </div>
                        {byCategory.length > 0 && (
                            <div className="space-y-1">
                                {byCategory.map(c => (
                                    <div key={c.cat} className="flex justify-between text-xs">
                                        <span className={isDark ? 'text-slate-400' : 'text-slate-500'}>{c.cat}</span>
                        <span className={`font-bold ${isDark ? 'text-slate-200' : 'text-slate-700'}`}>{formatMoney(c.total, settings.currency)}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Expense List */}
                    <div className="space-y-2">
                        {filtered.length === 0 && <p className={`text-center py-8 ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>No expenses found.</p>}
                        {[...filtered].sort((a,b) => new Date(b.date) - new Date(a.date)).map(exp => (
                            <div key={exp.id} className={`p-3 rounded-xl border flex justify-between items-center ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'} shadow-sm`}>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${isDark ? 'bg-red-900/30 text-red-400 border border-red-800' : 'bg-red-100 text-red-700'}`}>{exp.category}</span>
                                        <span className={`text-xs ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>{formatDate(exp.date)}</span>
                                    </div>
                                    <p className={`text-sm font-medium ${isDark ? 'text-slate-200' : 'text-slate-700'}`}>{exp.desc}</p>
                                </div>
                                <div className="flex items-center gap-3 ml-3">
                                    <span className={`font-bold ${isDark ? 'text-red-400' : 'text-red-600'}`}>{formatMoney(exp.amount, settings.currency)}</span>
                                    <button onClick={async () => { const ok = await showConfirm("Delete this expense?", "Confirm"); if(ok) onDelete('expenses', exp.id); }} className={`p-1 ${isDark ? 'text-slate-500 hover:text-red-400' : 'text-slate-400 hover:text-red-500'}`}><Icon name="Trash2" size={14}/></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 📊 ANALYTICS DASHBOARD - Phase 1
        // English Only | Dark Mode Support
        // ========================================
        
        const AnalyticsDashboard = ({ customers, invoices, cheques, stock, settings, onViewCustomer, expenses }) => {
            
            // ========== DATA CALCULATIONS ==========
            
            // Financial Metrics
            const totalSales = invoices.reduce((sum, inv) => sum + (parseFloat(inv.total) || 0), 0);
            // ✅ FIX 4: ledger سے real-time calculate - stale inv.paid نہیں
            const totalPaid = customers.reduce((sum, cust) => {
                return sum + (cust.ledger || [])
                    .filter(tx => tx.type === 'Credit')
                    .reduce((a, b) => a + (parseFloat(b.amount) || 0), 0);
            }, 0);
            const totalReceivables = customers.reduce((sum, cust) => {
                const d = (cust.ledger||[]).filter(t=>t.type==='Debit').reduce((a,b)=>a+(parseFloat(b.amount)||0),0);
                const cr = (cust.ledger||[]).filter(t=>t.type==='Credit').reduce((a,b)=>a+(parseFloat(b.amount)||0),0);
                const bal = d - cr;
                return sum + (bal > 0 ? bal : 0);
            }, 0);
            
            // Expenses
            const totalExpenses = (expenses || []).reduce((sum, e) => sum + (parseFloat(e.amount) || 0), 0);
            
            // Live Invoice Profit (from costRate)
            const liveProfit = invoices.reduce((sum, inv) => {
                return sum + (inv.items || []).reduce((iSum, item) => {
                    return iSum + (parseFloat(item.profit) || 0);
                }, 0);
            }, 0);
            
            // Net Profit = Live Profit - Expenses
            const netProfit = liveProfit - totalExpenses;
            
            // Cheque Stats
            const pendingCheques = cheques.filter(c => c.status === 'pending');
            const returnedCheques = cheques.filter(c => c.status === 'returned');
            const clearedCheques = cheques.filter(c => c.status === 'cleared');
            const pendingAmount = pendingCheques.reduce((sum, c) => sum + (parseFloat(c.amount) || 0), 0);
            const returnedAmount = returnedCheques.reduce((sum, c) => sum + (parseFloat(c.amount) || 0), 0);
            
            // Stock Stats
            const lowStockItems = stock.filter(item => (parseFloat(item.qty) || 0) < 5);
            const outOfStock = stock.filter(item => (parseFloat(item.qty) || 0) === 0);
            const stockValue = stock.reduce((sum, item) => sum + ((parseFloat(item.qty) || 0) * (parseFloat(item.costPrice) || parseFloat(item.price) || 0)), 0);
            
            // Customer Balance Calculation
            const getCustomerBalance = (customer) => {
                const ledger = customer.ledger || [];
                const debits = ledger.filter(t => t.type === 'Debit').reduce((a, b) => a + (parseFloat(b.amount) || 0), 0);
                const credits = ledger.filter(t => t.type === 'Credit').reduce((a, b) => a + (parseFloat(b.amount) || 0), 0);
                return debits - credits;
            };
            
            // Customer Stats
            const customersWithBalance = customers.filter(c => getCustomerBalance(c) > 0);
            const highRiskCustomers = customersWithBalance.filter(c => getCustomerBalance(c) > 100000);
            const topCustomers = customers
                .map(c => {
                    const custInvoices = invoices.filter(i => i.customer && String(i.customer.id) === String(c.id));
                    const totalBilled = custInvoices.reduce((sum, inv) => sum + (parseFloat(inv.total) || 0), 0);
                    return { ...c, totalBilled, balance: getCustomerBalance(c), invoiceCount: custInvoices.length };
                })
                .filter(c => c.totalBilled > 0)
                .sort((a, b) => b.totalBilled - a.totalBilled)
                .slice(0, 5);
            
            // Time-based Sales
            const today = new Date().toDateString();
            const todaySales = invoices.filter(i => new Date(i.date).toDateString() === today);
            const todayRevenue = todaySales.reduce((sum, i) => sum + (parseFloat(i.total) || 0), 0);
            
            // This Month
            const thisMonth = new Date().getMonth();
            const thisYear = new Date().getFullYear();
            const monthSales = invoices.filter(i => {
                const d = new Date(i.date);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            });
            const monthRevenue = monthSales.reduce((sum, i) => sum + (parseFloat(i.total) || 0), 0);
            
            // Business Health Score (0-100)
            const collectionRate = totalSales > 0 ? (totalPaid / totalSales) * 100 : 0;
            const chequeReturnRate = cheques.length > 0 ? (returnedCheques.length / cheques.length) * 100 : 0;
            const stockHealth = stock.length > 0 ? ((stock.length - outOfStock.length) / stock.length) * 100 : 100;
            const healthScore = Math.round(
                (collectionRate * 0.4) + 
                ((100 - chequeReturnRate) * 0.3) + 
                (stockHealth * 0.3)
            );
            
            // AI Insights
            const insights = [];
            
            if (returnedCheques.length > 0) {
                insights.push({
                    type: 'warning',
                    icon: 'AlertTriangle',
                    title: 'Cheque Returns Alert',
                    message: `${returnedCheques.length} cheque${returnedCheques.length > 1 ? 's' : ''} returned - Rs. ${returnedAmount.toLocaleString()}`,
                    priority: 1
                });
            }
            
            if (lowStockItems.length > 0) {
                insights.push({
                    type: 'warning',
                    icon: 'Package',
                    title: 'Low Stock Alert',
                    message: `${lowStockItems.length} item${lowStockItems.length > 1 ? 's' : ''} running low`,
                    priority: 2
                });
            }
            
            if (highRiskCustomers.length > 0) {
                insights.push({
                    type: 'danger',
                    icon: 'Users',
                    title: 'High Balance Customers',
                    message: `${highRiskCustomers.length} customer${highRiskCustomers.length > 1 ? 's' : ''} with >100k balance`,
                    priority: 1
                });
            }
            
            if (totalReceivables > 500000) {
                insights.push({
                    type: 'info',
                    icon: 'TrendingUp',
                    title: 'High Receivables',
                    message: `Focus on collections - Rs. ${totalReceivables.toLocaleString()} pending`,
                    priority: 3
                });
            }
            
            if (collectionRate > 80) {
                insights.push({
                    type: 'success',
                    icon: 'CheckCircle',
                    title: 'Great Collection Rate!',
                    message: `You're collecting ${Math.round(collectionRate)}% of sales`,
                    priority: 4
                });
            }
            
            // Sort by priority
            insights.sort((a, b) => a.priority - b.priority);
            
            // ========== RENDER ==========
            
            return (
                <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 dark:bg-slate-900">
                    
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-700 dark:to-indigo-700 rounded-xl p-6 shadow-lg">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                    <Icon name="TrendingUp" size={28} />
                                    Business Insights
                                </h1>
                                <p className="text-blue-100 text-sm mt-1">Your business at a glance</p>
                            </div>
                            <button 
                                onClick={() => { const e = document.createEvent('CustomEvent'); e.initCustomEvent('navigate-expenses', true, true, {}); document.dispatchEvent(e); }}
                                className="bg-white/20 hover:bg-white/30 text-white px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1 border border-white/30"
                            >
                                <Icon name="Wallet" size={14}/> Expenses
                            </button>
                        </div>
                    </div>
                    
                    {/* Business Health Score */}
                    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h2 className="text-lg font-bold text-slate-800 dark:text-white">Business Health Score</h2>
                                <p className="text-xs text-slate-500 dark:text-slate-400">Overall performance indicator</p>
                            </div>
                            <div className={`text-4xl font-bold ${
                                healthScore >= 80 ? 'text-green-600 dark:text-green-400' :
                                healthScore >= 60 ? 'text-yellow-600 dark:text-yellow-400' :
                                'text-red-600 dark:text-red-400'
                            }`}>
                                {healthScore}
                                <span className="text-xl">/100</span>
                            </div>
                        </div>
                        
                        {/* Progress Bar */}
                        <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-3 overflow-hidden">
                            <div 
                                className={`h-full rounded-full transition-all ${
                                    healthScore >= 80 ? 'bg-green-600' :
                                    healthScore >= 60 ? 'bg-yellow-600' :
                                    'bg-red-600'
                                }`}
                                style={{ width: `${healthScore}%` }}
                            />
                        </div>
                        
                        {/* Score Breakdown */}
                        <div className="grid grid-cols-3 gap-3 mt-4">
                            <div className="text-center">
                                <p className="text-2xl font-bold text-green-600 dark:text-green-400">{Math.round(collectionRate)}%</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400">Collection Rate</p>
                            </div>
                            <div className="text-center">
                                <p className="text-2xl font-bold text-blue-600 dark:text-blue-400">{Math.round(100 - chequeReturnRate)}%</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400">Cheque Success</p>
                            </div>
                            <div className="text-center">
                                <p className="text-2xl font-bold text-purple-600 dark:text-purple-400">{Math.round(stockHealth)}%</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400">Stock Health</p>
                            </div>
                        </div>
                    </div>
                    
                    {/* AI Insights & Alerts */}
                    {insights.length > 0 && (
                        <div className="space-y-2">
                            <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Smart Alerts</h2>
                            {insights.map((insight, idx) => (
                                <div 
                                    key={idx}
                                    className={`rounded-lg p-4 border-l-4 ${
                                        insight.type === 'danger' ? 'bg-red-50 dark:bg-red-900/20 border-red-500' :
                                        insight.type === 'warning' ? 'bg-orange-50 dark:bg-orange-900/20 border-orange-500' :
                                        insight.type === 'success' ? 'bg-green-50 dark:bg-green-900/20 border-green-500' :
                                        'bg-blue-50 dark:bg-blue-900/20 border-blue-500'
                                    }`}
                                >
                                    <div className="flex items-start gap-3">
                                        <Icon 
                                            name={insight.icon} 
                                            size={20} 
                                            className={
                                                insight.type === 'danger' ? 'text-red-600 dark:text-red-400' :
                                                insight.type === 'warning' ? 'text-orange-600 dark:text-orange-400' :
                                                insight.type === 'success' ? 'text-green-600 dark:text-green-400' :
                                                'text-blue-600 dark:text-blue-400'
                                            }
                                        />
                                        <div className="flex-1">
                                            <p className={`font-bold text-sm ${
                                                insight.type === 'danger' ? 'text-red-800 dark:text-red-300' :
                                                insight.type === 'warning' ? 'text-orange-800 dark:text-orange-300' :
                                                insight.type === 'success' ? 'text-green-800 dark:text-green-300' :
                                                'text-blue-800 dark:text-blue-300'
                                            }`}>
                                                {insight.title}
                                            </p>
                                            <p className="text-xs text-slate-600 dark:text-slate-400 mt-0.5">{insight.message}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    {/* Financial Summary */}
                    <div className="space-y-2">
                        <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Financial Overview</h2>
                        <div className="grid grid-cols-2 gap-3">
                            <Card className="bg-green-50 dark:bg-green-900/20 border-green-100 dark:border-green-800">
                                <p className="text-xs font-bold text-green-700 dark:text-green-400 uppercase">Today Revenue</p>
                                <p className="text-2xl font-bold text-slate-800 dark:text-white">{formatMoney(todayRevenue, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{todaySales.length} invoice{todaySales.length !== 1 ? 's' : ''}</p>
                            </Card>
                            
                            <Card className="bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800">
                                <p className="text-xs font-bold text-blue-700 dark:text-blue-400 uppercase">This Month</p>
                                <p className="text-2xl font-bold text-slate-800 dark:text-white">{formatMoney(monthRevenue, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{monthSales.length} invoice{monthSales.length !== 1 ? 's' : ''}</p>
                            </Card>
                            
                            <Card className="bg-orange-50 dark:bg-orange-900/20 border-orange-100 dark:border-orange-800">
                                <p className="text-xs font-bold text-orange-700 dark:text-orange-400 uppercase">Receivables</p>
                                <p className="text-2xl font-bold text-slate-800 dark:text-white">{formatMoney(totalReceivables, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{customersWithBalance.length} customer{customersWithBalance.length !== 1 ? 's' : ''}</p>
                            </Card>
                            
                            <Card className="bg-purple-50 dark:bg-purple-900/20 border-purple-100 dark:border-purple-800">
                                <p className="text-xs font-bold text-purple-700 dark:text-purple-400 uppercase">Stock Value</p>
                                <p className="text-2xl font-bold text-slate-800 dark:text-white">{formatMoney(stockValue, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{stock.length} item{stock.length !== 1 ? 's' : ''}</p>
                            </Card>
                        </div>
                    </div>
                    
                    {/* 💰 Profit & Expenses Section */}
                    <div className="space-y-2">
                        <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Profit & Expenses</h2>
                        <div className="grid grid-cols-3 gap-2">
                            <Card className="bg-emerald-50 dark:bg-emerald-900/20 border-emerald-100 dark:border-emerald-800">
                                <p className="text-xs font-bold text-emerald-700 dark:text-emerald-400 uppercase">Gross Profit</p>
                                <p className="text-xl font-bold text-slate-800 dark:text-white">{formatMoney(liveProfit, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Live invoices only</p>
                            </Card>
                            <Card className="bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800">
                                <p className="text-xs font-bold text-red-700 dark:text-red-400 uppercase">Total Expenses</p>
                                <p className="text-xl font-bold text-slate-800 dark:text-white">{formatMoney(totalExpenses, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{(expenses||[]).length} entries</p>
                            </Card>
                            <Card className={`${netProfit >= 0 ? 'bg-green-50 dark:bg-green-900/20 border-green-100 dark:border-green-800' : 'bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800'}`}>
                                <p className={`text-xs font-bold uppercase ${netProfit >= 0 ? 'text-green-700 dark:text-green-400' : 'text-red-700 dark:text-red-400'}`}>Net Profit</p>
                                <p className="text-xl font-bold text-slate-800 dark:text-white">{formatMoney(netProfit, settings.currency)}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{liveProfit > 0 ? `${((netProfit/liveProfit)*100).toFixed(1)}% margin` : 'Add cost rates'}</p>
                            </Card>
                        </div>
                        {/* Expense by Category */}
                        {(expenses||[]).length > 0 && (
                            <Card>
                                <p className="text-xs font-bold text-slate-600 dark:text-slate-300 uppercase mb-2">Expenses by Category</p>
                                <div className="space-y-1.5">
                                    {EXPENSE_CATEGORIES.map(cat => {
                                        const catTotal = (expenses||[]).filter(e => e.category === cat).reduce((a,e) => a + (parseFloat(e.amount)||0), 0);
                                        if (!catTotal) return null;
                                        const pct = totalExpenses > 0 ? (catTotal/totalExpenses*100) : 0;
                                        return (
                                            <div key={cat}>
                                                <div className="flex justify-between text-xs mb-0.5">
                                                    <span className="text-slate-600 dark:text-slate-300">{cat}</span>

                    {/* Cheque Summary */}

                            <Card className="bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800">

                                <p className="text-xl font-bold text-slate-800 dark:text-white">{returnedCheques.length}</p>
                                <p className="text-xs text-slate-500 dark:text-slate-400">{formatMoney(returnedAmount, settings.currency)}</p>
                            </Card>
                        </div>
                    </div>
                    
                    {/* Stock Alerts */}
                    {(lowStockItems.length > 0 || outOfStock.length > 0) && (
                        <div className="space-y-2">
                            <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Stock Alerts</h2>
                            <div className="grid grid-cols-2 gap-3">
                                {outOfStock.length > 0 && (
                                    <Card className="bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800">
                                        <div className="flex items-center gap-2">
                                            <Icon name="AlertCircle" size={20} className="text-red-600 dark:text-red-400" />
                                            <div>
                                                <p className="text-xs font-bold text-red-700 dark:text-red-400">Out of Stock</p>
                                                <p className="text-2xl font-bold text-slate-800 dark:text-white">{outOfStock.length}</p>
                                            </div>
                                        </div>
                                    </Card>
                                )}
                                
                                {lowStockItems.length > 0 && (
                                    <Card className="bg-orange-50 dark:bg-orange-900/20 border-orange-100 dark:border-orange-800">
                                        <div className="flex items-center gap-2">
                                            <Icon name="Package" size={20} className="text-orange-600 dark:text-orange-400" />
                                            <div>
                                                <p className="text-xs font-bold text-orange-700 dark:text-orange-400">Low Stock</p>
                                                <p className="text-2xl font-bold text-slate-800 dark:text-white">{lowStockItems.length}</p>
                                                <p className="text-xs text-slate-500 dark:text-slate-400">Below 5 units</p>
                                            </div>
                                        </div>
                                    </Card>
                                )}
