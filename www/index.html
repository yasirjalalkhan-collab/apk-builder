                        </div>
                    )}
                    
                    {/* Top Customers */}
                    {topCustomers.length > 0 && (
                        <div className="space-y-2">
                            <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Top 5 Customers</h2>
                            <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 divide-y divide-slate-200 dark:divide-slate-700">
                                {topCustomers.map((customer, idx) => (
                                    <div 
                                        key={customer.id} 
                                        onClick={() => onViewCustomer(customer.id)}
                                        className="p-4 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer transition-colors"
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-white ${
                                                idx === 0 ? 'bg-yellow-500' :
                                                idx === 1 ? 'bg-slate-400' :
                                                idx === 2 ? 'bg-orange-600' :
                                                'bg-blue-500'
                                            }`}>
                                                {idx + 1}
                                            </div>
                                            <div>
                                                <p className="font-bold text-slate-800 dark:text-white">{customer.name}</p>
                                                <p className="text-xs text-slate-500 dark:text-slate-400">{customer.invoiceCount} invoice{customer.invoiceCount !== 1 ? 's' : ''}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-bold text-slate-800 dark:text-white">{formatMoney(customer.totalBilled, settings.currency)}</p>
                                            {customer.balance > 0 && (
                                                <p className="text-xs text-red-600 dark:text-red-400">Due: {formatMoney(customer.balance, settings.currency)}</p>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    
                    {/* ========== PHASE 2 FEATURES ========== */}
                    
                    {/* Sales Trend (Last 7 Days) */}
                    {(() => {
                        const last7Days = [];
                        for (let i = 6; i >= 0; i--) {
                            const d = new Date();
                            d.setDate(d.getDate() - i);
                            const dateStr = d.toDateString();
                            const daySales = invoices.filter(inv => new Date(inv.date).toDateString() === dateStr);
                            const dayRevenue = daySales.reduce((sum, inv) => sum + (parseFloat(inv.total) || 0), 0);
                            last7Days.push({
                                date: d.getDate() + ' ' + d.toLocaleDateString('en', { month: 'short' }),
                                revenue: dayRevenue,
                                count: daySales.length
                            });
                        }
                        const maxRevenue = Math.max(...last7Days.map(d => d.revenue), 1);
                        
                        return (
                            <div className="space-y-2">
                                <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Sales Trend (Last 7 Days)</h2>
                                <div className="bg-white dark:bg-slate-800 rounded-lg p-4 border border-slate-200 dark:border-slate-700">
                                    <div className="flex items-end justify-between gap-1 h-32">
                                        {last7Days.map((day, idx) => (
                                            <div key={idx} className="flex-1 flex flex-col items-center gap-1">
                                                <div className="w-full flex items-end justify-center" style={{ height: '100px' }}>
                                                    <div 
                                                        className="w-full bg-gradient-to-t from-blue-600 to-blue-400 dark:from-blue-500 dark:to-blue-300 rounded-t transition-all hover:opacity-80"
                                                        style={{ 
                                                            height: `${(day.revenue / maxRevenue) * 100}%`,
                                                            minHeight: day.revenue > 0 ? '8px' : '2px'
                                                        }}
                                                        title={`Rs. ${day.revenue.toLocaleString()}`}
                                                    />
                                                </div>
                                                <p className="text-[9px] text-slate-500 dark:text-slate-400 font-bold">{day.date}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-3 pt-3 border-t border-slate-200 dark:border-slate-700 text-center">
                                        <p className="text-xs text-slate-500 dark:text-slate-400">
                                            Total: <span className="font-bold text-slate-800 dark:text-white">
                                                {formatMoney(last7Days.reduce((sum, d) => sum + d.revenue, 0), settings.currency)}
                                            </span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                    
                    {/* Month Comparison */}
                    {(() => {
                        const thisMonth = new Date().getMonth();
                        const thisYear = new Date().getFullYear();
                        const lastMonth = thisMonth === 0 ? 11 : thisMonth - 1;
                        const lastMonthYear = thisMonth === 0 ? thisYear - 1 : thisYear;
                        
                        const thisMonthInvoices = invoices.filter(i => {
                            const d = new Date(i.date);
                            return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
                        });
                        
                        const lastMonthInvoices = invoices.filter(i => {
                            const d = new Date(i.date);
                            return d.getMonth() === lastMonth && d.getFullYear() === lastMonthYear;
                        });
                        
                        const thisMonthRevenue = thisMonthInvoices.reduce((sum, i) => sum + (parseFloat(i.total) || 0), 0);
                        const lastMonthRevenue = lastMonthInvoices.reduce((sum, i) => sum + (parseFloat(i.total) || 0), 0);
                        const growth = lastMonthRevenue > 0 ? ((thisMonthRevenue - lastMonthRevenue) / lastMonthRevenue * 100) : 0;
                        
                        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                        
                        return (
                            <div className="space-y-2">
                                <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Performance Comparison</h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <Card className="bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800">
                                        <p className="text-xs font-bold text-blue-700 dark:text-blue-400">{monthNames[thisMonth]} {thisYear}</p>
                                        <p className="text-2xl font-bold text-slate-800 dark:text-white">{formatMoney(thisMonthRevenue, settings.currency)}</p>
                                        <p className="text-xs text-slate-500 dark:text-slate-400">{thisMonthInvoices.length} invoices</p>
                                    </Card>
                                    
                                    <Card className="bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700">
                                        <p className="text-xs font-bold text-slate-600 dark:text-slate-400">{monthNames[lastMonth]} {lastMonthYear}</p>
                                        <p className="text-2xl font-bold text-slate-800 dark:text-white">{formatMoney(lastMonthRevenue, settings.currency)}</p>
                                        <p className="text-xs text-slate-500 dark:text-slate-400">{lastMonthInvoices.length} invoices</p>
                                    </Card>
                                </div>
                                
                                {lastMonthRevenue > 0 && (
                                    <div className={`rounded-lg p-4 ${
                                        growth > 0 ? 'bg-green-50 dark:bg-green-900/20' : 
                                        growth < 0 ? 'bg-red-50 dark:bg-red-900/20' : 
                                        'bg-slate-50 dark:bg-slate-800'
                                    }`}>
                                        <div className="flex items-center justify-center gap-2">
                                            <Icon 
                                                name={growth > 0 ? 'TrendingUp' : growth < 0 ? 'TrendingDown' : 'Minus'} 
                                                className={growth > 0 ? 'text-green-600 dark:text-green-400' : growth < 0 ? 'text-red-600 dark:text-red-400' : 'text-slate-600 dark:text-slate-400'}
                                                size={24}
                                            />
                                            <div className="text-center">
                                                <p className={`text-2xl font-bold ${
                                                    growth > 0 ? 'text-green-600 dark:text-green-400' : 
                                                    growth < 0 ? 'text-red-600 dark:text-red-400' : 
                                                    'text-slate-600 dark:text-slate-400'
                                                }`}>
                                                    {growth > 0 ? '+' : ''}{Math.round(growth)}%
                                                </p>
                                                <p className="text-xs text-slate-600 dark:text-slate-400">
                                                    {growth > 0 ? 'Growth' : growth < 0 ? 'Decline' : 'No Change'} vs Last Month
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })()}
                    
                    {/* Collection Schedule (Upcoming Payments) */}
                    {(() => {
                        // Get customers with balance
                        const upcomingCollections = customers
                            .map(c => {
                                const balance = getCustomerBalance(c);
                                const custPendingCheques = pendingCheques.filter(chq => String(chq.customerId) === String(c.id));
                                const chequeAmount = custPendingCheques.reduce((sum, chq) => sum + (parseFloat(chq.amount) || 0), 0);
                                return {
                                    ...c,
                                    balance,
                                    pendingCheques: custPendingCheques.length,
                                    chequeAmount
                                };
                            })
                            .filter(c => c.balance > 0 || c.pendingCheques > 0)
                            .sort((a, b) => b.balance - a.balance)
                            .slice(0, 5);
                        
                        if (upcomingCollections.length === 0) return null;
                        
                        return (
                            <div className="space-y-2">
                                <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Collection Priority</h2>
                                <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 divide-y divide-slate-200 dark:divide-slate-700">
                                    {upcomingCollections.map((customer, idx) => (
                                        <div 
                                            key={customer.id}
                                            onClick={() => onViewCustomer(customer.id)}
                                            className="p-4 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer transition-colors"
                                        >
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-full flex items-center justify-center font-bold">
                                                        {idx + 1}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-slate-800 dark:text-white">{customer.name}</p>
                                                        {customer.pendingCheques > 0 && (
                                                            <p className="text-xs text-orange-600 dark:text-orange-400">
                                                                {customer.pendingCheques} pending cheque{customer.pendingCheques > 1 ? 's' : ''}
                                                            </p>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-bold text-red-600 dark:text-red-400">
                                                        {formatMoney(customer.balance, settings.currency)}
                                                    </p>
                                                    {customer.chequeAmount > 0 && (
                                                        <p className="text-xs text-slate-500 dark:text-slate-400">
                                                            +{formatMoney(customer.chequeAmount, settings.currency)} pending
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-3 border border-blue-100 dark:border-blue-800">
                                    <p className="text-sm text-blue-800 dark:text-blue-300 text-center">
                                        <Icon name="Info" size={16} className="inline mr-1" />
                                        <span className="font-bold">
                                            Total to Collect: {formatMoney(upcomingCollections.reduce((sum, c) => sum + c.balance, 0), settings.currency)}
                                        </span>
                                    </p>
                                </div>
                            </div>
                        );
                    })()}
                    
                    {/* Monthly Goal Tracker */}
                    {(() => {
                        // Simple goal: 1.5M per month (you can make this configurable later)
                        const monthlyGoal = 1500000;
                        const progress = (monthRevenue / monthlyGoal) * 100;
                        const remaining = monthlyGoal - monthRevenue;
                        const daysInMonth = new Date(thisYear, thisMonth + 1, 0).getDate();
                        const today = new Date().getDate();
                        const daysRemaining = daysInMonth - today;
                        const dailyTarget = daysRemaining > 0 ? remaining / daysRemaining : 0;
                        
                        return (
                            <div className="space-y-2">
                                <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Monthly Goal</h2>
                                <div className="bg-gradient-to-br from-purple-50 to-pink-50 dark:from-purple-900/20 dark:to-pink-900/20 rounded-xl p-6 border border-purple-100 dark:border-purple-800">
                                    <div className="flex items-center justify-between mb-4">
                                        <div>
                                            <p className="text-sm text-purple-700 dark:text-purple-400 font-bold">Target: {formatMoney(monthlyGoal, settings.currency)}</p>
                                            <p className="text-3xl font-bold text-slate-800 dark:text-white mt-1">{Math.round(progress)}%</p>
                                        </div>
                                        <div className={`text-6xl ${progress >= 100 ? 'animate-bounce' : ''}`}>
                                            {progress >= 100 ? '🎉' : progress >= 75 ? '🔥' : progress >= 50 ? '💪' : '🎯'}
                                        </div>
                                    </div>
                                    
                                    <div className="w-full bg-white/50 dark:bg-slate-700/50 rounded-full h-4 overflow-hidden mb-4">
                                        <div 
                                            className={`h-full rounded-full transition-all ${
                                                progress >= 100 ? 'bg-green-500' :
                                                progress >= 75 ? 'bg-blue-500' :
                                                progress >= 50 ? 'bg-yellow-500' :
                                                'bg-orange-500'
                                            }`}
                                            style={{ width: `${Math.min(progress, 100)}%` }}
                                        />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-white/60 dark:bg-slate-800/60 rounded-lg p-3">
                                            <p className="text-xs text-slate-600 dark:text-slate-400">Achieved</p>
                                            <p className="text-lg font-bold text-slate-800 dark:text-white">{formatMoney(monthRevenue, settings.currency)}</p>
                                        </div>
                                        <div className="bg-white/60 dark:bg-slate-800/60 rounded-lg p-3">
                                            <p className="text-xs text-slate-600 dark:text-slate-400">Remaining</p>
                                            <p className="text-lg font-bold text-slate-800 dark:text-white">
                                                {remaining > 0 ? formatMoney(remaining, settings.currency) : '✓ Done!'}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {daysRemaining > 0 && remaining > 0 && (
                                        <div className="mt-3 pt-3 border-t border-purple-200 dark:border-purple-800">
                                            <p className="text-xs text-center text-purple-700 dark:text-purple-400">
                                                <Icon name="Target" size={14} className="inline mr-1" />
                                                Need <span className="font-bold">{formatMoney(dailyTarget, settings.currency)}/day</span> for {daysRemaining} days
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })()}

                    {/* ========== PHASE 3: PROFIT & LOSS ========== */}
                    {(() => {
                        // Match invoice items to stock to get costPrice
                        const profitData = invoices.reduce((acc, inv) => {
                            (inv.items || []).forEach(item => {
                                const stockItem = stock.find(s =>
                                    s.name === item.name &&
                                    s.displaySize === item.displaySize &&
                                    s.type === item.type
                                );
                                const sellPrice = (item.amount || 0) * (item.qty || 0);
                                const costPerUnit = stockItem ? (parseFloat(stockItem.costPrice) || 0) : 0;
                                const costTotal = costPerUnit * (item.qty || 0);
                                acc.totalRevenue += sellPrice;
                                acc.totalCost += costTotal;
                                acc.items.push({
                                    name: item.name,
                                    displaySize: item.displaySize,
                                    qty: item.qty,
                                    sellPrice,
                                    costTotal,
                                    profit: sellPrice - costTotal,
                                    hasCost: !!stockItem?.costPrice
                                });
                            });
                            return acc;
                        }, { totalRevenue: 0, totalCost: 0, items: [] });

                        const grossProfit = profitData.totalRevenue - profitData.totalCost;
                        const profitMargin = profitData.totalRevenue > 0 ? (grossProfit / profitData.totalRevenue) * 100 : 0;
                        const hasCostData = profitData.items.some(i => i.hasCost);

                        // Group by product name for summary
                        const productMap = {};
                        profitData.items.forEach(i => {
                            const key = i.name;
                            if (!productMap[key]) productMap[key] = { name: key, revenue: 0, cost: 0, qty: 0 };
                            productMap[key].revenue += i.sellPrice;
                            productMap[key].cost += i.costTotal;
                            productMap[key].qty += i.qty;
                        });
                        const productList = Object.values(productMap)
                            .map(p => ({ ...p, profit: p.revenue - p.cost, margin: p.revenue > 0 ? ((p.revenue - p.cost) / p.revenue) * 100 : 0 }))
                            .sort((a, b) => b.profit - a.profit);

                        return (
                            <div className="space-y-2">
                                <h2 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase">Profit & Loss</h2>

                                {!hasCostData && (
                                    <div className="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg p-4">
                                        <p className="text-xs text-amber-800 dark:text-amber-300 flex items-start gap-2">
                                            <Icon name="Info" size={16} className="shrink-0 mt-0.5" />
                                            <span>Add <strong>Cost Price</strong> in Stock items to enable profit tracking. Go to <strong>Stock → Add Item</strong> and enter both Cost & Sale prices.</span>
                                        </p>
                                    </div>
                                )}

                                {/* Main P&L Card */}
                                <div className={`rounded-xl p-5 border ${grossProfit >= 0 ? 'bg-gradient-to-br from-green-50 to-emerald-50 dark:from-green-900/25 dark:to-emerald-900/25 border-green-200 dark:border-green-800' : 'bg-gradient-to-br from-red-50 to-pink-50 dark:from-red-900/25 dark:to-pink-900/25 border-red-200 dark:border-red-800'}`}>
                                    <div className="flex items-center justify-between mb-3">
                                        <p className="text-sm font-bold text-slate-700 dark:text-slate-300">Net Profit / Loss</p>
                                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${grossProfit >= 0 ? 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400' : 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400'}`}>
                                            {grossProfit >= 0 ? 'PROFIT' : 'LOSS'}
                                        </span>
                                    </div>
                                    <p className={`text-4xl font-bold ${grossProfit >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}`}>
                                        {grossProfit < 0 ? '-' : '+'}{formatMoney(Math.abs(grossProfit), settings.currency)}
                                    </p>
                                    <p className={`text-sm mt-1 font-bold ${grossProfit >= 0 ? 'text-green-500 dark:text-green-500' : 'text-red-500 dark:text-red-500'}`}>
                                        Margin: {profitMargin.toFixed(1)}%
                                    </p>
                                </div>

                                {/* Revenue / Cost / Profit breakdown */}
                                <div className="grid grid-cols-3 gap-2">
                                    <Card className="bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800">
                                        <p className="text-[9px] font-bold text-blue-600 dark:text-blue-400 uppercase">Revenue</p>
                                        <p className="text-lg font-bold text-slate-800 dark:text-white">{formatMoney(profitData.totalRevenue, settings.currency)}</p>
                                    </Card>
                                    <Card className="bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800">
                                        <p className="text-[9px] font-bold text-red-600 dark:text-red-400 uppercase">Cost</p>
                                        <p className="text-lg font-bold text-slate-800 dark:text-white">{formatMoney(profitData.totalCost, settings.currency)}</p>
                                    </Card>
                                    <Card className={`${grossProfit >= 0 ? 'bg-green-50 dark:bg-green-900/20 border-green-100 dark:border-green-800' : 'bg-pink-50 dark:bg-pink-900/20 border-pink-100 dark:border-pink-800'}`}>
                                        <p className={`text-[9px] font-bold uppercase ${grossProfit >= 0 ? 'text-green-600 dark:text-green-400' : 'text-pink-600 dark:text-pink-400'}`}>Profit</p>
                                        <p className={`text-lg font-bold ${grossProfit >= 0 ? 'text-green-600 dark:text-green-400' : 'text-pink-600 dark:text-pink-400'}`}>{formatMoney(grossProfit, settings.currency)}</p>
                                    </Card>
                                </div>

                                {/* Product-wise Profit */}
                                {productList.length > 0 && hasCostData && (
                                    <div className="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 overflow-hidden">
                                        <div className="p-3 bg-slate-50 dark:bg-slate-700 border-b dark:border-slate-600">

                    {/* ========== PHASE 3: INVENTORY VALUE & OPTIMIZATION ========== */}
                    {(() => {

                        const stockAtSale = stock.reduce((sum, s) => sum + ((parseFloat(s.qty) || 0) * (parseFloat(s.rate) || 0)), 0);

                        const hasPrices = stock.some(s => s.costPrice && s.rate);

                        const thirtyDaysAgo = new Date();
                        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                        const recentSales = {};

                        const fastMovers = stockWithMovement.filter(s => s.soldQty >= 10 && s.qty > 0).sort((a,b) => b.soldQty - a.soldQty).slice(0, 3);

        const CustomerList = ({ customers, setCustomers, onView, invoices, isGuest, settings }) => {

                        <div className={`rounded-lg border flex items-center px-2 ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}><Icon name="Filter" className="text-slate-400 mr-1" size={16}/><select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className={`bg-transparent outline-none text-xs font-bold h-full py-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}><option value="name">A-Z Name</option><option value="balance">High Balance</option></select></div>

                    {showAdd && (<Card className="mb-4"><h3 className="font-bold mb-3">New Customer</h3><div className="space-y-3"><Input label="Name" value={newCust.name} onChange={e => setNewCust({...newCust, name: e.target.value})} /><Input label="Company" value={newCust.company} onChange={e => setNewCust({...newCust, company: e.target.value})} /><Input label="Mobile (Unique ID)" value={newCust.mobile} onChange={e => setNewCust({...newCust, mobile: e.target.value})} /><Input label="Address / City" value={newCust.address} onChange={e => setNewCust({...newCust, address: e.target.value})} /><Button onClick={handleAdd}>Save</Button></div></Card>)}

                    {filtered.map(c => {

                                <div><p className={`font-bold ${isDark ? 'text-white' : 'text-slate-800'}`}>{c.name}</p><p className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{c.mobile || 'No Mobile'} • {c.address}</p></div>
                                <div className="flex items-center gap-3">{balance > 0 && (<span className={`font-bold text-sm px-2 py-1 rounded ${isDark ? 'text-red-400 bg-red-900/30 border border-red-800' : 'text-red-600 bg-red-50'}`}>Rs. {balance.toLocaleString()}</span>)}<Icon name="ArrowLeft" className="rotate-180 text-slate-400" size={16} /></div>
                            </div>

        // --- Dashboard (Home Screen) ---
        const Dashboard = ({ stats, cheques, customers, invoices, stock, onNew, onViewAll, onViewCheques, onOpenSettings, settings, onViewCustomer, onViewInvoice, isGuest, onViewExpenses }) => {

                    {/* Search Bar */}
                    <div className="bg-white dark:bg-slate-800 p-3 rounded-lg border border-slate-200 dark:border-slate-700 flex items-center gap-2 shadow-sm sticky top-0 z-10">

                            {searchResults.invoices.length > 0 && <div><h3 className="font-bold text-slate-500 text-xs uppercase mb-2">Invoices</h3><div className="space-y-2">{searchResults.invoices.map(i => (<div key={i.id} onClick={() => onViewInvoice(i)} className="bg-white dark:bg-slate-800 p-3 rounded border border-slate-200 dark:border-slate-700 flex justify-between items-center"><span className="dark:text-white">#{i.id} - {i.customer?.name}</span><span className="font-bold dark:text-white">{formatMoney(i.total, settings.currency)}</span></div>))}</div></div>}

                            <div className="h-10"></div>

            );
        };

            /* ================= INVOICE, STOCK, PRINT & MAIN APP ================= */
   const InlineItemEntry = ({ onAdd, settings, initialData, clearAfterAdd = true }) => { 
            const isDark = settings?.mode === 'dark';
            const [type, setType] = useState(initialData?.type || TYPE_DOOR); 
            const [itemName, setItemName] = useState(initialData?.name || ''); 
            const [rate, setRate] = useState(initialData?.rate || ''); 
            const [costRate, setCostRate] = useState(initialData?.costRate || ''); 
            const [qty, setQty] = useState(initialData?.qty || ''); 
            const [w, setW] = useState(initialData?.w || ''); 
            const [hIn, setHIn] = useState(initialData?.hIn || ''); 
            const [skinHeight, setSkinHeight] = useState(initialData?.hIn === 96 ? 96 : 84); 
            const [woodL, setWoodL] = useState(initialData?.woodL || ''); 
            const [woodLUnit, setWoodLUnit] = useState(initialData?.woodLUnit || 'ft'); 
            const [woodW, setWoodW] = useState(initialData?.woodW || ''); 
            const [woodT, setWoodT] = useState(initialData?.woodT || ''); 
            
            const isLiveMode = settings?.invMode === 'live';
            
            const nameRef = useRef(null); const rateRef = useRef(null); const costRateRef = useRef(null); const wRef = useRef(null); const hRef = useRef(null); const qtyRef = useRef(null); const lRef = useRef(null); const wdRef = useRef(null); const tRef = useRef(null); 
            
            useEffect(() => { 
                if (initialData) { setType(initialData.type); setItemName(initialData.name); setRate(initialData.rate); setCostRate(initialData.costRate || ''); setQty(initialData.qty); setW(initialData.w); setHIn(initialData.hIn); setWoodL(initialData.woodL); if (initialData.woodLUnit) setWoodLUnit(initialData.woodLUnit); setWoodW(initialData.woodW); setWoodT(initialData.woodT); } 
            }, [initialData]); 
            
            const calc = useMemo(() => { 
                const r = parseFloat(rate) || 0; 
                if (type === TYPE_DOOR) return calculateDoor(w, hIn, r, settings.doorCalc); 
                else if (type === TYPE_SKIN) return calculateDoor(w, skinHeight, r, settings.doorCalc); 
                else if (type === TYPE_WOOD) return calculateWood(woodL, woodW, woodT, settings.woodUnit, woodLUnit, r); 
                else return calculatePlywood(r); 
            }, [type, w, hIn, skinHeight, woodL, woodLUnit, woodW, woodT, rate, qty, settings]); 
            
            const handleAddInternal = async () => { 
                if(!itemName) { await showAlert("Item Name is required", "Required"); return; }
                const q = parseFloat(qty) || 0; 
                const cr = parseFloat(costRate) || 0;
                const totalAmt = calc.amount * q;
                const totalCost = cr * calc.qtyUnit * q;
                const profit = isLiveMode ? (totalAmt - totalCost) : 0;
                onAdd({ type, name: itemName, qty: q, rate: parseFloat(rate), costRate: cr, amount: calc.amount, displaySize: calc.displaySize, billingSize: calc.billingSize, unit: calc.unit, qtyUnit: calc.qtyUnit, w, hIn, woodL, woodLUnit, woodW, woodT, profit }); 
                if (clearAfterAdd) { setW(''); setHIn(''); setWoodL(''); setWoodW(''); setWoodT(''); setQty(''); setCostRate(''); setTimeout(() => { if (type === TYPE_WOOD) lRef.current?.focus(); else wRef.current?.focus(); }, 50); } 
            }; 
            const focus = (ref) => ref.current?.focus(); 
            
            return (
                <div className={`p-3 rounded-lg border shadow-sm mb-4 ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-slate-100 border-slate-200'}`}>
                    <div className="flex gap-2 mb-3 overflow-x-auto pb-1">{ITEM_TYPES.map(t => (<button key={t.id} onClick={() => setType(t.id)} className={`px-3 py-1 text-xs font-bold rounded-full border ${type === t.id ? 'bg-slate-800 text-white border-slate-800 dark:bg-green-600 dark:border-green-600' : (isDark ? 'bg-slate-700 text-slate-300 border-slate-600' : 'bg-white text-slate-500 border-slate-300')}`}>{t.label}</button>))}</div>
                    <div className="flex gap-2 mb-2">
                        <div className="flex-1"><input ref={nameRef} className={`w-full p-2 border rounded text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} placeholder="Item Name" value={itemName} onChange={e => setItemName(e.target.value)} onKeyDown={e => e.key === 'Enter' && focus(rateRef)}/></div>
                        <div className="w-24"><input ref={rateRef} type="number" className={`w-full p-2 border rounded text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200'}`} placeholder="Sale Rate" value={rate} onChange={e => setRate(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') { if (isLiveMode) focus(costRateRef); else if (type === TYPE_WOOD) focus(lRef); else if (type === TYPE_PLYWOOD) focus(qtyRef); else focus(wRef); }}}/></div>
                        {isLiveMode && (
                            <div className="w-24"><input ref={costRateRef} type="number" className={`w-full p-2 border rounded text-sm ${isDark ? 'bg-amber-900/30 border-amber-800 text-amber-300' : 'bg-amber-50 border-amber-300'}`} placeholder="Cost Rate" value={costRate} onChange={e => setCostRate(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') { if (type === TYPE_WOOD) focus(lRef); else if (type === TYPE_PLYWOOD) focus(qtyRef); else focus(wRef); }}}/></div>
                        )}

const InvoiceEditor = ({ invoice, onSave, onCancel, stock, settings, profile }) => {
    // 🌑 Dark Mode Check
    const isDark = settings?.mode === 'dark';
    const theme = {
        bg: isDark ? 'bg-slate-900' : 'bg-slate-50',
        card: isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200',
        text: isDark ? 'text-slate-100' : 'text-slate-800',
        subText: isDark ? 'text-slate-400' : 'text-slate-500',
        input: isDark ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-slate-200',
        border: isDark ? 'border-slate-700' : 'border-slate-200',
        blueBg: isDark ? 'bg-blue-900/30 border-blue-800' : 'bg-blue-50 border-blue-200',
    };

    const [inv, setInv] = useState(invoice); 
    const [editIndex, setEditIndex] = useState(null); 
    const [cashPaid, setCashPaid] = useState(invoice.cashPaid || invoice.paid || 0); 
    
    // 🛠️ Ensure every cheque has a status
    const [chequesList, setChequesList] = useState(
        (invoice.cheques || (invoice.chequeDetails ? [invoice.chequeDetails] : []))
        .map(c => ({...c, status: c.status || 'pending'})) 
    );
    
    const [newCheque, setNewCheque] = useState({ bank: '', number: '', amount: '', date: '' });

    // 🔄 Smart Calculation Logic
    useEffect(() => { 
        const sub = inv.items.reduce((acc, i) => acc + (i.amount * i.qty), 0); 
        const tot = sub - (inv.discount || 0); 
        
        // ⚡ Only sum cheques that are NOT returned
        const totalChequeAmt = chequesList.reduce((a, c) => {
            if (c.status === 'returned') return a; // Skip returned cheques
            return a + (parseFloat(c.amount)||0);
        }, 0);

        const totalPaid = (parseFloat(cashPaid) || 0) + totalChequeAmt; 
        
        setInv(prev => ({ 
            ...prev, 
            subtotal: sub, 
            total: tot, 
            paid: totalPaid, 
            cashPaid: parseFloat(cashPaid) || 0, 
            cheques: chequesList, // Save the list with status
            balance: tot - totalPaid 
        })); 
    }, [inv.items, inv.discount, cashPaid, chequesList]);

    const handleItemAction = (item) => { const newItems = [...inv.items]; if (editIndex !== null) { newItems[editIndex] = item; setEditIndex(null); } else { newItems.unshift(item); } setInv({ ...inv, items: newItems }); }; 
    const editItem = (idx) => setEditIndex(idx); 
    const deleteItem = (idx) => { const i = [...inv.items]; i.splice(idx, 1); setInv({ ...inv, items: i }); setEditIndex(null); }; 
    
    const handleAddCheque = async () => {
        if (!newCheque.amount || !newCheque.bank) { await showAlert("Bank and Amount are required!", "Required"); return; }
        // ✨ Add new cheque with 'pending' status
        const chequeObj = { 
            id: Math.random().toString(36).substr(2, 9), 
            ...newCheque, 
            status: 'pending' 
        };
        setChequesList([...chequesList, chequeObj]); 
        setNewCheque({ bank: '', number: '', amount: '', date: '' });
    };

    const removeCheque = (index) => { const updatedList = [...chequesList]; updatedList.splice(index, 1); setChequesList(updatedList); };

    // 🎛️ Change Cheque Status
    const updateChequeStatus = (index, newStatus) => {
        const updatedList = [...chequesList];
        updatedList[index].status = newStatus;
        setChequesList(updatedList);
    };

    return (
        <div className={`flex flex-col h-full ${theme.bg} ${theme.text}`}>
            {/* Header */}
            <div className={`p-4 border-b sticky top-0 z-10 ${theme.card}`}>
                <div className="flex items-center gap-2 mb-2">
                    <button onClick={onCancel}><Icon name="ArrowLeft" className={theme.subText} /></button> 
                    <h2 className="font-bold text-lg">{inv.id ? 'Edit Invoice' : 'New Invoice'} #{profile?.invoicePrefix ? profile.invoicePrefix + '-' : ''}{inv.id?.toUpperCase()}</h2>
                </div>
                <Card className={`p-3 ${isDark ? 'bg-slate-800' : ''}`}>
                    <div className="grid grid-cols-2 gap-2 mb-2">
                        <Input className={theme.input} placeholder="Customer Name" value={inv.customer.name} onChange={e => setInv({...inv, customer: {...inv.customer, name: e.target.value}})} />
                        <Input className={theme.input} placeholder="Mobile" value={inv.customer.mobile} onChange={e => setInv({...inv, customer: {...inv.customer, mobile: e.target.value}})} />
                    </div>
                    <Input className={theme.input} placeholder="Complete Address" value={inv.customer.address} onChange={e => setInv({...inv, customer: {...inv.customer, address: e.target.value}})} />
                </Card>
            </div>

            {/* Body */}
            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                <InlineItemEntry onAdd={handleItemAction} settings={settings} initialData={editIndex !== null ? inv.items[editIndex] : null} clearAfterAdd={editIndex === null} />
                
                {/* Items List */}
                <div className={`rounded-lg border ${theme.border} overflow-hidden`}>
                    {inv.items.length === 0 && <p className={`text-center p-4 ${theme.subText}`}>No items added yet.</p>}
                    {inv.items.map((item, idx) => (
                        <div key={idx} className={`p-3 border-b ${theme.border} flex justify-between items-start ${editIndex === idx ? (isDark ? 'bg-blue-900/50' : 'bg-blue-50') : (isDark ? 'bg-slate-800' : 'bg-white')}`}>
                            <div>
                                <p className="font-bold text-sm">{item.name}</p>
                                <p className={`text-xs ${theme.subText}`}>{item.displaySize}</p>
                                <p className={`text-xs font-medium ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>Qty: {item.qty} | Rate: {item.rate}</p>
                            </div>
                            <div className="text-right flex flex-col items-end gap-1">
                                <p className="font-bold text-sm">{formatMoney(item.amount * item.qty, settings.currency)}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => editItem(idx)} className="text-blue-500 bg-blue-50 dark:bg-slate-700 p-1 rounded"><Icon name="Pencil" size={14} /></button>
                                    <button onClick={() => deleteItem(idx)} className="text-red-500 bg-red-50 dark:bg-slate-700 p-1 rounded"><Icon name="Trash2" size={14} /></button>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>

                {/* Total & Payment Section */}
                <div className={`p-4 border ${theme.border} rounded-lg shadow-sm ${theme.card}`}>
                    <div className="flex justify-between font-bold text-lg text-green-600 mb-2">
                        <span>Total:</span><span>{formatMoney(inv.total, settings.currency)}</span>
                    </div>
                    
                    <div className="space-y-2">
                        <Input label="Cash Received" type="number" className={theme.input} value={cashPaid} onChange={e => setCashPaid(e.target.value)} />

                        {/* Summary Footer */}
                        <div className={`text-sm font-bold pt-1 border-t ${theme.border} space-y-1`}>
                            {inv.cashPaid > 0 && (<div className="flex justify-between"><span>Cash Paid:</span><span>{formatMoney(inv.cashPaid, settings.currency)}</span></div>)}
                            <div className="flex justify-between text-orange-600 pt-1 border-t border-dashed border-slate-300 dark:border-slate-600">
                                <span>Balance:</span><span>{formatMoney(inv.balance, settings.currency)}</span>
                            </div>
                        </div>
                        
                        <Button onClick={() => onSave(inv)} icon="Save" className="w-full mt-2">Finish Bill</Button>
                    </div>
                </div>
                <div className="h-10"></div>
            </div>
        </div>
    ); 
};

const StockManager = ({ stock, onSave, onDelete, settings }) => {
    const isDark = settings?.mode === 'dark';
    const [view, setView] = React.useState('list'); 
    const [tab, setTab] = React.useState('door'); 
    const [batch, setBatch] = React.useState([]); 
    const [searchTerm, setSearchTerm] = React.useState(''); 
    const [openedFolder, setOpenedFolder] = React.useState(null); 
    const [folderView, setFolderView] = React.useState('grid'); 

    // --- CART FUNCTIONS ---
    const handleAddToBatch = (item) => {
        const tempId = Date.now().toString();
        setBatch([...batch, { ...item, tempId, type: tab }]);
    };

    const removeFromBatch = (tempId) => {
        setBatch(batch.filter(b => b.tempId !== tempId));
    };

    const handleFinishAndSave = () => {
        if (batch.length === 0) { setView('list'); return; }
        batch.forEach(newItem => {
            const existingItem = stock.find(s => 
                s.name.toLowerCase() === newItem.name.toLowerCase() && 
                s.displaySize === newItem.displaySize &&
                s.type === newItem.type
            );
            if (existingItem) {
                const updatedQty = (parseFloat(existingItem.qty) || 0) + (parseFloat(newItem.qty) || 0);
                onSave(existingItem.id, { ...existingItem, qty: updatedQty });
            } else {
                const newId = Date.now().toString() + Math.random().toString().slice(2,5);
                onSave(newId, { ...newItem, id: newId });
            }
        });
        setBatch([]);
        setView('list');
    };

    // --- SEARCH & GROUPING ---
    const typeItems = stock.filter(s => 
        s.type === tab && 
        s.name.toLowerCase().includes(searchTerm.toLowerCase())
    );

    const groupedStock = {};
    typeItems.forEach(item => {
        const nameKey = item.name.trim(); 
        if (!groupedStock[nameKey]) {
            groupedStock[nameKey] = {
                name: nameKey,
                totalQty: 0,
                variations: 0,
                items: []
            };
        }
        groupedStock[nameKey].items.push(item);
        groupedStock[nameKey].totalQty += (parseFloat(item.qty) || 0);
        groupedStock[nameKey].variations += 1;
    });
    const groupsArray = Object.values(groupedStock);

    // --- VIEW: ADD MODE ---
    if (view === 'add') return (
        <div className="h-full flex flex-col bg-slate-50 dark:bg-slate-900 p-4 animate-in pb-20">

                            <p className="text-xs text-slate-500">{b.displaySize} | Qty: {b.qty}</p>

                    </div>
                ))}
            </div>
            <button

                    );

                    // دستیاب اسٹاک نکالیں (ایڈٹ موڈ کا خیال رکھتے ہوئے)
                    let availQty = parseFloat(sItem?.qty || 0);

                            const oldItem = oldInvoice.items.find(o => o.name === newItem.name && o.displaySize === newItem.displaySize && o.type === newItem.type);
                            if(oldItem) availQty += parseFloat(oldItem.qty || 0);
                    }

                    const reqQty = parseFloat(newItem.qty || 0);

                    // اگر مال کم ہے
                    if (availQty < reqQty) {

                const finalCustomer = { ...custData, ledger: newLedger, mobile: inv.customer.mobile };
                const finalInvoice = { ...inv, customer: finalCustomer };
                
                saveData('invoices', inv.id, finalInvoice); 
                saveData('customers', finalCustomer.id, finalCustomer); 
                (inv.cheques || []).forEach(c => { 
                    const chqData = { ...c, customerId: finalCustomer.id, customerName: finalCustomer.name, invoiceId: inv.id }; 
                    saveData('cheques', c.id, chqData); 
                }); 

                // Stock Deduction (Zero Limit)
                let tempStock = JSON.parse(JSON.stringify(stock));
                let stockChanged = false;

                const oldInvForStock = invoices.find(i => i.id === inv.id);
                if (oldInvForStock) {
                    oldInvForStock.items.forEach(oldItem => {
                        const s = tempStock.find(k => k.name === oldItem.name && k.displaySize === oldItem.displaySize && k.type === oldItem.type);
                        if (s) { s.qty = (parseFloat(s.qty)||0) + (parseFloat(oldItem.qty)||0); stockChanged = true; }
                    });
                }

                inv.items.forEach(newItem => {
                    const s = tempStock.find(k => k.name === newItem.name && k.displaySize === newItem.displaySize && k.type === newItem.type);
                    if (s) {
                        // 👇 زیرو لمٹ لاجک
                        s.qty = Math.max(0, (parseFloat(s.qty)||0) - (parseFloat(newItem.qty)||0));
                        stockChanged = true;
                    }
                });

                if (stockChanged) {
                    tempStock.forEach(n => {
                        const o = stock.find(k => k.id === n.id);
                        if (o && parseFloat(o.qty) !== parseFloat(n.qty)) saveData('stock', n.id, n);
                    });
                }

                logAction(`Created Invoice #${inv.id}`); 
                setEditingInvoiceId(null); 
                setPrefillCustomer(null); 
                setPrintingInvoice(finalInvoice);
            };


                

 
            const getStats = () => {
                // Today's sales
                const todaySales = invoices.filter(i => new Date(i.date).toDateString() === new Date().toDateString()).reduce((a, b) => a + b.total, 0);
                const todayCount = invoices.filter(i => new Date(i.date).toDateString() === new Date().toDateString()).length;
                
                // Receivables - customers کے ledger سے calculate (Real-time)
                const balance = customers.reduce((total, cust) => {
                    const ledger = cust.ledger || [];
                    const debits = ledger.filter(t => t.type === 'Debit').reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
                    const credits = ledger.filter(t => t.type === 'Credit').reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
                    const custBalance = debits - credits;
                    return total + (custBalance > 0 ? custBalance : 0);
                }, 0);
                
                return { todaySales, todayCount, balance };
            };
if (loading) return <div className="flex h-screen items-center justify-center bg-slate-50 dark:bg-slate-900"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div></div>;

            if (!user && !isGuest) return <LoginScreen onLoginSuccess={() => setIsGuest(false)} onGuestLogin={() => setIsGuest(true)} />;
           if (isLocked) return <PinScreen systemId={systemId} onUnlock={(p, isMaster) => { if(isMaster || p===settings.securityPin) {setIsLocked(false); setPinError(false);} else {setPinError(true); setTimeout(()=>setPinError(false),2000);} }} error={pinError} />;

            // 🎨 Modal functions available globally via Context
            const modalFunctions = { showAlert, showConfirm, showPrompt };

            return (
                <ModalContext.Provider value={modalFunctions}>
                <div className="h-screen flex flex-col bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
                    <ErrorBoundary>
                        {!printingInvoice && !showSettings && !showProfileEdit && !viewingCustomerId && !editingInvoiceId && !showChequesModal && (
                            <div className="bg-green-800 dark:bg-slate-950 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
                                <div className="flex items-center gap-3"><div className="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg">{profile.name?profile.name[0]:'T'}</div><div><h1 className="font-bold text-lg leading-tight">{profile.name}</h1><p className="text-[10px] text-green-200">{profile.address}</p></div></div>
                                <div className="flex gap-2"><button onClick={()=>setShowProfileEdit(true)} className="bg-white/10 p-2 rounded-full"><Icon name="Edit2" size={18}/></button><button onClick={()=>setShowSettings(true)} className="bg-white/10 p-2 rounded-full"><Icon name="Settings" size={18}/></button></div>
                            </div>
                        )}
                        <div className="flex-1 overflow-y-auto relative w-full">
                            {showSettings ? <SettingsView settings={settings} setSettings={(s)=>saveData('settings','general',s)} onBack={()=>setShowSettings(false)} isGuest={isGuest} onBackup={handleBackup} onRestore={handleRestore} logs={logs} /> :
 showProfileEdit ? <ProfileEditor profile={profile} setProfile={(p)=>saveData('settings','profile',p)} onClose={()=>setShowProfileEdit(false)} /> :
 printingInvoice ? <InvoicePrinter invoice={printingInvoice} profile={profile} onClose={()=>setPrintingInvoice(null)} settings={settings} customers={customers} /> :

                                 editingInvoiceId ? <InvoiceEditor invoice={invoices.find(i=>i.id===editingInvoiceId) || {id:getNextInvoiceId(invoices), date:new Date().toISOString(), customer: prefillCustomer ? {name: prefillCustomer.name, mobile: prefillCustomer.mobile, address: prefillCustomer.address, id: prefillCustomer.id} : {name:'',mobile:'',address:''}, items:[], subtotal:0, total:0, paid:0}} onSave={handleSaveInvoice} onCancel={()=>{setEditingInvoiceId(null); setPrefillCustomer(null);}} stock={stock} settings={settings} profile={profile} /> :

                                 
                                                             /* 👇 یہ ہے وہ کوڈ جو کسٹمر کا کارڈ کھولے گا (ID Match Fix کے ساتھ) */
                             viewingCustomerId ? <CustomerDetail 
                                customer={customers.find(c => String(c.id) === String(viewingCustomerId))} 
                                customers={customers} 
                                setCustomers={(c)=>saveData('customers',c.id,c)} 
                                onDeleteCustomer={(id)=> {
                                    // 1. اس کسٹمر کی انوائسز ڈیلیٹ کریں
                                    invoices.filter(i => i.customer && String(i.customer.id) === String(id)).forEach(i => deleteData('invoices', i.id));
                                    // 2. اس کسٹمر کے چیکس ڈیلیٹ کریں
                                    cheques.filter(c => String(c.customerId) === String(id)).forEach(c => deleteData('cheques', c.id));
                                    // 3. آخر میں کسٹمر خود ڈیلیٹ
                                    deleteData('customers', id);
                                    
                                    
                                }} 
                // REMOVED:                 onDeleteInvoice={(inv) => {
                // REMOVED:                     deleteData('invoices', inv.id);
                // REMOVED:                     const targetCust = customers.find(c => String(c.id) === String(inv.customer.id));
                // REMOVED:                     if (targetCust && targetCust.ledger) {
                // REMOVED:                         const newLedger = targetCust.ledger.filter(tx => String(tx.invoiceId) !== String(inv.id));
                // REMOVED:                         saveData('customers', targetCust.id, { ...targetCust, ledger: newLedger });
                // REMOVED:                     }
                // REMOVED:                 }}

                                 
                                 invoices={invoices} 
                                cheques={cheques} 
                                setCheques={(c)=>saveData('cheques',c.id,c)} 
                                setInvoices={(i)=>saveData('invoices',i.id,i)} 
                                onEditInvoice={(id) => setEditingInvoiceId(id)} 
                                onViewInvoice={setPrintingInvoice} 
                                onCreateInvoice={(c) => { setPrefillCustomer(c); setEditingInvoiceId('new'); }} 
                                onBack={()=>setViewingCustomerId(null)} 
                                settings={settings} 
                                profile={profile} 
                                showAlert={showAlert}
                                showConfirm={showConfirm}
                                showPrompt={showPrompt}
                                formatMoney={formatMoney}
                                formatDate={formatDate}
                             /> :

 /* 👇 اس کوڈ کو showChequesModal والی جگہ پیسٹ کریں */
                                         /* 👇 FINAL FIXED CHEQUE MODAL (Compatible with your Chain Structure) */
                  /* 👇 FINAL CODE BASED ON DEEP RESEARCH (Fixes Duplication & Logic Disconnect) */
      /* 👇 یہ نیا، چھوٹا اور فکسڈ کوڈ ہے (اسے App Component میں پیسٹ کریں) */
showChequesModal ? (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 animate-in">
        <div className="bg-white dark:bg-slate-900 w-full max-w-4xl h-[90vh] rounded-xl shadow-2xl overflow-hidden relative flex flex-col">
            <button onClick={() => setShowChequesModal(false)} className="absolute top-4 right-4 z-10 p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200"><Icon name="X" size={20} /></button>
            
            <ChequeManager 
                customer={{name:'All Cheques', id:'all'}} 
                cheques={cheques} 
                invoices={invoices}      
                settings={settings}      
                onClose={() => setShowChequesModal(false)}
                showAlert={showAlert}
                showConfirm={showConfirm}
                showPrompt={showPrompt}
                formatMoney={formatMoney}
                formatDate={formatDate}

                // 🔴 1. INVOICE SYNC (یہاں انوائس اور لیجر کا تال میل ہوگا)
                setInvoices={(inv) => {
                    // A. انوائس سیو کریں
                    saveData('invoices', inv.id, inv);

                    // B. لیجر کو درست کریں (پرانی انٹری نکال کر نئی ڈالیں)
                    const cId = inv.customerId || (inv.customer ? inv.customer.id : null);
                    if (cId) {
                        const cust = customers.find(c => String(c.id) === String(cId));
                        if (cust) {
                            let newLedger = [...(cust.ledger || [])];
                            const payId = 'pay-' + inv.id;

                            // پرانی پیمنٹ ڈیلیٹ کریں
                            newLedger = newLedger.filter(tx => String(tx.id) !== payId);

                            // نئی پیمنٹ (اگر ہے تو) شامل کریں
                            const currentPaid = parseFloat(inv.paid) || 0;
                            if (currentPaid > 0) {
                                newLedger.unshift({
                                    id: payId,
                                    date: inv.date.split('T')[0],
                                    desc: `Payment for Bill #${inv.id}`,
                                    amount: currentPaid, 
                                    type: 'Credit',
                                    invoiceId: inv.id
                                });
                            }
                            // کسٹمر اپڈیٹ
                            saveData('customers', cust.id, { ...cust, ledger: newLedger });
                        }
                    }
                }}

                // 🔵 2. CHEQUE SAVE (یہاں ڈائریکٹ چیک لیجر میں جائے گا)
                setCheques={(data) => {
                    // اگر پوری لسٹ آرہی ہے (List Update)
                    if (typeof data === 'function' || Array.isArray(data)) { 
                        setCheques(prev => { 
                            const n = typeof data === 'function' ? data(prev) : data;
                            n.forEach(c => saveData('cheques', c.id, c)); 
                            return n; 
                        }); 
                        return;
                    } 
                    
                    // اگر ایک چیک اپڈیٹ ہو رہا ہے (Status Update)
                    const updatedCheque = data;
                    setCheques(prev => {
                        const list = prev.map(c => String(c.id) === String(updatedCheque.id) ? updatedCheque : c);
                        saveData('cheques', updatedCheque.id, updatedCheque);
                        return list;
                    });

                    // اگر یہ ڈائریکٹ چیک ہے (انوائس کا نہیں)، تو لیجر اپڈیٹ کریں
                    if (updatedCheque.customerId && !updatedCheque.invoiceId) {
                        const cust = customers.find(c => String(c.id) === String(updatedCheque.customerId));
                        if (cust) {
                            let newLedger = [...(cust.ledger || [])];
                            const ledgerId = 'chq-' + updatedCheque.id;

                            // پرانی انٹری صاف
                            newLedger = newLedger.filter(tx => String(tx.id) !== ledgerId && String(tx.chequeId) !== String(updatedCheque.id));

                            // اگر کلیئر ہے تو لیجر میں ڈالیں
                            if (updatedCheque.status === 'cleared') {
                                newLedger.unshift({ 
                                    id: ledgerId, 
                                    date: updatedCheque.date, 
                                    desc: `Cheque: ${updatedCheque.bank}`, 
                                    amount: parseFloat(updatedCheque.amount), 
                                    type: 'Credit', 
                                    chequeId: updatedCheque.id 
                                });
                            }
                            saveData('customers', cust.id, { ...cust, ledger: newLedger });
                        }
                    }
                }}

                // 3. DELETE Handler
                onDeleteCheque={(id) => deleteData('cheques', id)}
            />
        </div>
    </div>
) :


                                 
                          

                                 activeTab === 'stock' ? <StockManager 
    stock={stock} 
    onSave={(id, item) => saveData('stock', id, item)} 
    onDelete={(id) => deleteData('stock', id)} 
    settings={settings} 
/> :
                                  activeTab === 'analytics' ? <AnalyticsDashboard customers={customers} invoices={invoices} cheques={cheques} stock={stock} settings={settings} onViewCustomer={setViewingCustomerId} expenses={expenses} /> :
                                  activeTab === 'expenses' ? <ExpensesView expenses={expenses} onSave={saveData} onDelete={deleteData} settings={settings} showAlert={showAlert} showConfirm={showConfirm} formatMoney={formatMoney} formatDate={formatDate} /> :
                                  activeTab === 'customers' ? <CustomerList customers={customers} setCustomers={(c) => saveData('customers', c.id, c)} onView={setViewingCustomerId} invoices={invoices} isGuest={isGuest} settings={settings} /> :
                      
                                 activeTab === 'all' ? <AllInvoices invoices={invoices} onView={setPrintingInvoice} settings={settings} onHome={()=>handleNav('home')} /> :
                             <Dashboard stats={getStats()} cheques={cheques} customers={customers} invoices={invoices} stock={stock} onNew={()=>setEditingInvoiceId('new')} onViewAll={()=>setActiveTab('all')} onViewCheques={()=>setShowChequesModal(true)} onOpenSettings={()=>setShowSettings(true)} settings={settings} onViewCustomer={setViewingCustomerId} onViewInvoice={setPrintingInvoice} isGuest={isGuest} onViewExpenses={()=>handleNav('expenses')} />
                            }
                        </div>
                     {!printingInvoice && !showSettings && !viewingCustomerId && !editingInvoiceId && !showChequesModal && (    
                            <div className="bg-white dark:bg-slate-800 border-t dark:border-slate-700 p-2 pb-3 flex justify-around items-end shrink-0 z-10 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] safe-area-bottom">
                                <NavBtn icon="LayoutDashboard" label="Home" active={activeTab === 'home'} onClick={() => handleNav('home')} />
                                <NavBtn icon="Package" label="Stock" active={activeTab === 'stock'} onClick={() => handleNav('stock')} />
                                <div className="relative -top-5"><button onClick={() => setEditingInvoiceId('new')} className="bg-slate-900 dark:bg-green-600 text-green-400 dark:text-white p-4 rounded-full shadow-lg hover:bg-slate-800 active:scale-95 transition-all border-4 border-white dark:border-slate-900"><Icon name="Plus" size={28} strokeWidth={3} /></button></div>
                                <NavBtn icon="Users" label="Customers" active={activeTab === 'customers'} onClick={() => handleNav('customers')} />
                                <NavBtn icon="TrendingUp" label="Insights" active={activeTab === 'analytics' || activeTab === 'expenses'} onClick={() => handleNav('analytics')} />
                            </div>
                        )}
                        
                        {/* Calculator Slide-in Button */}
                        {/* Calculator Button - Always visible as overlay */}
                        {settings.showCalcFAB && (
                            <button 
                                onClick={() => setShowCalculatorOverlay(!showCalculatorOverlay)}
                                className="fixed bottom-20 bg-green-600 text-white p-3 rounded-r-full shadow-lg transition-all duration-500 z-50 flex items-center gap-2 hover:bg-green-700"
                                style={{left: calcButtonVisible ? '0px' : '-110px'}}
                                onMouseEnter={() => setCalcButtonVisible(true)}
                            >
                                <Icon name="Calculator" size={20} />
                                <span className="text-sm font-bold pr-2">Calculator</span>
                            </button>
                        )}
                        
                        {/* Calculator Overlay */}
                        {showCalculatorOverlay && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={() => setShowCalculatorOverlay(false)}>
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-700">
                                        <h3 className="font-bold text-lg dark:text-white">Calculator</h3>
                                        <button onClick={() => setShowCalculatorOverlay(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                                            <Icon name="X" size={24}/>
                                        </button>
                                    </div>
                                    <div className="p-4">
                                        <CalculatorView onClose={() => setShowCalculatorOverlay(false)} />
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* 🎨 Custom Modal UI (Phase 1) */}
                        {modal.show && (
                            <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95 duration-200">
                                    {/* Header */}
                                    <div className="bg-gradient-to-r from-green-600 to-green-700 dark:from-green-700 dark:to-green-800 px-6 py-4">
                                        <h3 className="font-bold text-white text-lg flex items-center gap-2">
                                            {modal.type === 'alert' && <Icon name="AlertCircle" size={24} />}
                                            {modal.type === 'confirm' && <Icon name="HelpCircle" size={24} />}
                                            {modal.type === 'prompt' && <Icon name="Edit" size={24} />}
                                            {modal.title}
                                        </h3>
                                    </div>
                                    
                                    {/* Body */}
                                    <div className="p-6">
                                        <p className="text-slate-700 dark:text-slate-200 text-base leading-relaxed whitespace-pre-line mb-4">
                                            {modal.message}
                                        </p>
                                        
                                        {/* Prompt Input */}
                                        {modal.type === 'prompt' && (
                                            <input 
                                                type="text" 
                                                defaultValue={modal.defaultValue}
                                                id="modal-prompt-input"
                                                className="w-full border-2 border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 text-slate-800 dark:text-white dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all"
                                                autoFocus
                                                onKeyPress={(e) => {
                                                    if (e.key === 'Enter') {
                                                        const val = document.getElementById('modal-prompt-input').value;
                                                        modal.onConfirm(val);
                                                    }
                                                }}
                                            />
                                        )}
                                        
                                        {/* Buttons */}
                                        <div className="flex gap-3 justify-end mt-6">
                                            {modal.onCancel && (
                                                <button 
                                                    onClick={modal.onCancel}
                                                    className="px-6 py-2.5 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold hover:bg-slate-300 dark:hover:bg-slate-600 active:scale-95 transition-all"
                                                >
                                                    Cancel
                                                </button>
                                            )}
                                            <button 
                                                onClick={() => {
                                                    if (modal.type === 'prompt') {
                                                        const val = document.getElementById('modal-prompt-input')?.value || '';
                                                        modal.onConfirm(val);
                                                    } else {
                                                        modal.onConfirm();
                                                    }
                                                }}
                                                className="px-6 py-2.5 rounded-lg bg-green-600 dark:bg-green-700 text-white font-bold hover:bg-green-700 dark:hover:bg-green-800 active:scale-95 transition-all shadow-lg"
                                            >
                                                {modal.type === 'confirm' ? 'OK' : modal.type === 'prompt' ? 'Submit' : 'OK'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                    </ErrorBoundary>
                </div>
                </ModalContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
